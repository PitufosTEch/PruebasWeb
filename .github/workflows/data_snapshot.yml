name: Data Snapshot (cada 15 min)

# Genera el snapshot PROCESADO del dashboard (mismo formato que el cache
# localStorage, <5 MB) y lo publica en la rama dedicada `data-snapshot` con
# force-push (1 solo commit, sin inflar el historial ni disparar redeploys de
# GitHub Pages). El dashboard lo lee via raw.githubusercontent.com para el
# primer pintado instantaneo en cualquier dispositivo.
#
# El procesamiento NO se duplica: Playwright abre el dashboard real, deja que
# procese la carga en vivo y se extrae el cache procesado de localStorage.

on:
  schedule:
    - cron: '*/15 * * * *'   # cada 15 minutos (best-effort en GitHub Actions)
  workflow_dispatch: {}        # ejecucion manual

permissions:
  contents: write

concurrency:
  group: data-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Generar snapshot procesado
        env:
          SNAPSHOT_OUT: ${{ runner.temp }}/data_snapshot.json
        run: |
          python SCRaices-LLM/app/generar_snapshot.py
          ls -lh "$SNAPSHOT_OUT"

      - name: Publicar en rama data-snapshot (force-push, 1 commit)
        run: |
          set -euo pipefail
          git config user.name  "snapshot-bot"
          git config user.email "actions@users.noreply.github.com"

          # Rama huerfana: sin historial, siempre 1 commit
          git checkout --orphan data-snapshot
          git rm -rf --cached . >/dev/null 2>&1 || true

          cp "${{ runner.temp }}/data_snapshot.json" data_snapshot.json
          SIZE=$(du -h data_snapshot.json | cut -f1)
          git add -f data_snapshot.json
          git commit -m "data: snapshot $(date -u '+%Y-%m-%dT%H:%MZ') ($SIZE)"
          git push -f origin data-snapshot
          echo "Publicado en rama data-snapshot ($SIZE)"
