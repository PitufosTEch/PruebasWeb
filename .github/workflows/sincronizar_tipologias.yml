name: Sincronizar Tipologías AppSheet → Firebase

on:
  schedule:
    - cron: '0 10 * * 1-5'   # Lunes a viernes 10:00 UTC (07:00 Chile)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-tipologias
  cancel-in-progress: true

jobs:
  sincronizar:
    name: Extrae tipologías de AppSheet y actualiza Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: tipologias-pip-${{ runner.os }}
          restore-keys: tipologias-pip-

      - name: Instalar dependencias Python
        run: pip install --upgrade pip requests playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}
          restore-keys: playwright-chromium-

      - name: Instalar Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Sincronizar tipologías
        working-directory: SCRaices-LLM/curvas_s
        env:
          APPSHEET_COOKIES_B64: ${{ secrets.APPSHEET_COOKIES_B64 }}
          FIREBASE_URL:         https://scraices-dashboard-default-rtdb.firebaseio.com
        run: python sincronizar_tipologias.py
