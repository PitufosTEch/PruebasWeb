name: Generación Diaria de Informes

# Captura PDFs e HTMLs de todos los proyectos cada día y los sube a Drive.
# Permite revisar los informes del día sin depender de ningún equipo local.

on:
  schedule:
    - cron: '0 13 * * *'     # Diario 13:00 UTC = 10:00 AM Chile (sin horario verano)
  workflow_dispatch: {}       # Ejecución manual desde GitHub Actions

permissions:
  contents: write

concurrency:
  group: informes-diarios
  cancel-in-progress: false

jobs:
  capturar-informes:
    name: Capturar y subir informes a Drive
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: informes-pip-${{ hashFiles('SCRaices-LLM/informes/requirements.txt') }}
          restore-keys: informes-pip-

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install -r SCRaices-LLM/informes/requirements.txt

      - name: Instalar Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Capturar informes y subir a Drive
        working-directory: SCRaices-LLM/informes
        env:
          GOOGLE_REFRESH_TOKEN:      ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:          ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:      ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FIREBASE_URL:              https://scraices-dashboard-default-rtdb.firebaseio.com
          DRIVE_FOLDER_INFORMES_ID:  ${{ secrets.DRIVE_FOLDER_INFORMES_ID }}
          ENVIAR_CORREOS:            "0"
        run: python ejecutar_informes_cloud.py

      - name: Subir archivos como artefacto (respaldo 7 días)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: informes-${{ github.run_id }}
          path: /tmp/informes_*
          retention-days: 7
          if-no-files-found: warn

      - name: Publicar dashboard actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SCRaices-LLM/dashboard/index_live_v3.html
          git diff --staged --quiet || git commit -m "auto: actualizar tab Despachos en dashboard [skip ci]"
          git push

      - name: Resumen en caso de error
        if: failure()
        run: echo "::error::La captura de informes falló. Revisa el log completo arriba."
