name: Actualización Curvas S Semanal

# Corre diariamente para mantener las Curvas S actualizadas con datos de AppSheet.
# El envío de correos solo ocurre los lunes (controlado en informes_lunes.yml).

on:
  schedule:
    - cron: '0 12 * * 1-5'   # Lunes a viernes 12:00 UTC (09:00 Chile)
  workflow_dispatch: {}        # Ejecución manual desde GitHub Actions

permissions:
  contents: write              # Para push al dashboard (sincronizar_dashboard.py)

concurrency:
  group: curvas-semanal
  cancel-in-progress: false

jobs:
  update-curvas:
    name: Generar y subir Curvas S
    runs-on: ubuntu-latest
    timeout-minutes: 90        # 10 proyectos x ~5 min promedio + margen

    steps:
      # ── 1. Código ────────────────────────────────────────────────────────────
      - name: Checkout repositorio
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────────────
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Cache pip ──────────────────────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: curvas-pip-${{ hashFiles('SCRaices-LLM/curvas_s/requirements.txt') }}
          restore-keys: curvas-pip-

      # ── 4. Dependencias Python ────────────────────────────────────────────────
      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install \
            matplotlib \
            scipy \
            Pillow \
            numpy \
            requests \
            psutil \
            google-auth \
            google-auth-httplib2 \
            google-api-python-client

      # ── 5. Playwright (para leer AppSheet con cookies guardadas) ──────────────
      - name: Instalar Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      # ── 6. Ejecutar orquestador ───────────────────────────────────────────────
      - name: Ejecutar curvas S (todos los proyectos)
        working-directory: SCRaices-LLM/curvas_s
        env:
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          FIREBASE_URL:           https://scraices-dashboard-default-rtdb.firebaseio.com
          APPSHEET_COOKIES_B64:   ${{ secrets.APPSHEET_COOKIES_B64 }}
        run: python ejecutar_curvas_cloud.py

      # ── 7. Log de resumen en caso de fallo ────────────────────────────────────
      - name: Resumen en caso de error
        if: failure()
        run: |
          echo "::error::El orquestador de Curvas S falló. Revisa el log completo arriba."
