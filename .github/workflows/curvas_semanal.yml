name: Actualización Curvas S Semanal

# Cada proyecto corre en un runner paralelo independiente (matrix strategy).
# Tiempo estimado: ~10-15 min (el proyecto más lento) en vez de 60-90 min en serie.
# Post-proceso (sincronizar_dashboard, gantt, avance) corre al terminar todos.

on:
  schedule:
    - cron: '0 12 * * 1-5'   # Lunes a viernes 12:00 UTC (09:00 Chile)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: curvas-semanal
  cancel-in-progress: false

jobs:
  # ── Job 1: Un runner por proyecto, todos en paralelo ─────────────────────
  curvas-proyecto:
    name: "Curvas — ${{ matrix.label }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false      # Si un proyecto falla, los demás siguen
      matrix:
        include:
          - { label: "P119 Ñuke Mapu",        script: curvas_automatico }
          - { label: "P38  Aliwen",            script: curvas_automatico_aliwen }
          - { label: "P39  El Coihue",         script: curvas_automatico_coihue }
          - { label: "P127 Nuevo Cunco",       script: curvas_automatico_cunco }
          - { label: "P12  Juan Huilcan",      script: curvas_automatico_huilcan }
          - { label: "P14  Com. Madihue",      script: curvas_automatico_madihue }
          - { label: "P126 El Maitén",         script: curvas_automatico_maiten }
          - { label: "P131 Raíces Melipeuco",  script: curvas_automatico_melipeuco }
          - { label: "P116 Sonia Quilaleo",    script: curvas_automatico_quilaleo }
          - { label: "P31  Trovolhue",         script: curvas_automatico_trovolhue }
          - { label: "P28  Elsa Pinchulaf",    script: curvas_automatico_pinchulaf }
          # ── Proyectos futuros — descomentar cuando tengan script y carta Gantt ──────
          # Rural Araucanía 2024
          # - { label: "P118 El Canelo",               script: curvas_automatico_el_canelo }
          # - { label: "P123 Peumayen 2023",           script: curvas_automatico_peumayen_2023 }
          # - { label: "P128 Com. José Carvajal",      script: curvas_automatico_jose_carvajal }
          # - { label: "P129 Nuevo Gorbea",            script: curvas_automatico_nuevo_gorbea }
          # - { label: "P132 Com. Fermín Manquilef",   script: curvas_automatico_fermin_manquilef }
          # Rural Araucanía 2025
          # - { label: "P145 Perkenko 2025",           script: curvas_automatico_perkenko }
          # - { label: "P146 Demanda Villarrica 2025", script: curvas_automatico_villarrica_2025 }
          # - { label: "P147 Ruka Antü",               script: curvas_automatico_ruka_antu }
          # - { label: "P150 Llaima Antu",             script: curvas_automatico_llaima_antu }
          # - { label: "P152 Ayün Ruka",               script: curvas_automatico_ayun_ruka }
          # - { label: "P153 Vilcún Mapu",             script: curvas_automatico_vilcun_mapu }
          # - { label: "P154 Com. José Carvajal 2",    script: curvas_automatico_carvajal_2 }
          # - { label: "P155 Los Arrayanes",           script: curvas_automatico_arrayanes }
          # - { label: "P156 Poyen Ruka",              script: curvas_automatico_poyen_ruka }
          # Rural Araucanía 2026
          # - { label: "P164 Conún Huenu",             script: curvas_automatico_conun_huenu }
          # - { label: "P166 Malalhue",                script: curvas_automatico_malalhue }
          # - { label: "P167 Witran Donguil",          script: curvas_automatico_witran_donguil }
          # - { label: "P168 Raíces de Perquenco",     script: curvas_automatico_perquenco }
          # - { label: "P170 Los Copihues de Cunco",   script: curvas_automatico_copihues_cunco }
          # - { label: "P171 Raíces de Trovolhue",     script: curvas_automatico_trovolhue_2026 }
          # - { label: "P172 Raíces Costeras",         script: curvas_automatico_raices_costeras }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: curvas-pip-${{ hashFiles('SCRaices-LLM/curvas_s/requirements.txt') }}
          restore-keys: curvas-pip-

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install \
            matplotlib scipy Pillow numpy requests psutil \
            google-auth google-auth-httplib2 google-api-python-client

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}
          restore-keys: playwright-chromium-

      - name: Instalar Playwright + Chromium
        run: pip install playwright && playwright install chromium --with-deps

      - name: "Ejecutar Curvas S — ${{ matrix.label }}"
        working-directory: SCRaices-LLM/curvas_s
        env:
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          FIREBASE_URL:          https://scraices-dashboard-default-rtdb.firebaseio.com
          APPSHEET_COOKIES_B64:  ${{ secrets.APPSHEET_COOKIES_B64 }}
        run: python ${{ matrix.script }}.py

      - name: Resumen en caso de error
        if: failure()
        run: echo "::error::Curvas S fallaron para ${{ matrix.label }}. Revisa el log."

  # ── Job 2: Post-proceso — corre cuando TODOS los proyectos terminan ───────
  post-proceso:
    name: Sincronizar Dashboard y Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: curvas-proyecto
    if: always()    # Corre aunque algún proyecto haya fallado

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: curvas-pip-${{ hashFiles('SCRaices-LLM/curvas_s/requirements.txt') }}
          restore-keys: curvas-pip-

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install \
            matplotlib scipy Pillow numpy requests psutil \
            google-auth google-auth-httplib2 google-api-python-client

      - name: Sincronizar dashboard (CURVAS_S_CONFIG → GitHub Pages)
        working-directory: SCRaices-LLM/curvas_s
        env:
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          FIREBASE_URL:          https://scraices-dashboard-default-rtdb.firebaseio.com
        run: python sincronizar_dashboard.py

      - name: Actualizar programa Gantt en Firebase
        working-directory: SCRaices-LLM/curvas_s
        env:
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FIREBASE_URL:          https://scraices-dashboard-default-rtdb.firebaseio.com
        run: python actualizar_gantt_programa.py

      - name: Calcular avance Gantt en Firebase
        working-directory: SCRaices-LLM/curvas_s
        env:
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FIREBASE_URL:          https://scraices-dashboard-default-rtdb.firebaseio.com
        run: python calcular_avance_gantt.py

      - name: Resumen en caso de error
        if: failure()
        run: echo "::error::Post-proceso falló. Revisa el log completo."
