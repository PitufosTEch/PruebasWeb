                ultimaDesp = {nombre:et.nombre, guia, dias:Math.floor(Math.random()*40)+1, fechaDespacho};
            } else if (prevDesp && Math.random() < 0.35) {
                estado="solicitado"; dias=Math.floor(Math.random()*15)+1;
                fechaSolicitud = new Date(Date.now() - dias*86400000).toLocaleDateString("es-CL");

            } else { estado="bloqueado"; dias=0; }
            etapas[et.key] = {estado,dias,nombre:et.nombre,codigo:et.codigo,guia,fechaDespacho,fechaSolicitud};
            prevDesp = estado === "despachado";
        });
        const despCount = Object.values(etapas).filter(e=>e.estado==="despachado").length;
        const pctDesp = Math.round((despCount/ETAPAS.length)*100);
        const pctInsp = Math.min(100, Math.round(pctDesp*(0.6+Math.random()*0.4)));
        const totalPagado = despCount > 0 ? Math.floor(Math.random()*6000000)+800000 : 0;

        if (Math.random()>.7) alertas.push({tipo:"naranja",etapa:ETAPAS[Math.floor(Math.random()*3)].nombre,msg:"Despacho sin pago M.O. asociado"});
        const estadoGeneral = despCount===ETAPAS.length ? "terminada" : alertas.some(a=>a.tipo==="rojo")||Object.values(etapas).some(e=>e.estado==="critico") ? "critico" : Object.values(etapas).some(e=>e.estado==="atencion") ? "atencion" : "en_tiempo";

// ========== HELPER: agrupar viviendas ==========
function agruparViviendas(viviendas, grupos) {
    if (!grupos || grupos.length === 0) {
        // Sin grupos: ordenar por primer despacho (más antiguos primero)
        const sorted = [...viviendas].sort((a,b) => {
            if (a.primerDespachoTs && b.primerDespachoTs) return a.primerDespachoTs - b.primerDespachoTs;
            if (a.primerDespachoTs) return -1;
            if (b.primerDespachoTs) return 1;
            return 0;
        });
        return [{ id:"_all", nombre:null, capataz:null, viviendas:sorted, colorIdx:-1 }];
    }

    const asignados = new Set();
    const result = grupos.map((g, idx) => {
        const vivs = g.beneficiarios.map(bid => viviendas.find(v=>v.id===bid)).filter(Boolean);
        vivs.forEach(v => asignados.add(v.id));
        return { id:g.id, nombre:g.nombre, capataz:g.capataz, viviendas:vivs, colorIdx:idx % GRUPO_COLORS.length };
    });

    // Sin asignar
    const sinAsignar = viviendas.filter(v => !asignados.has(v.id));
    if (sinAsignar.length > 0) {
        sinAsignar.sort((a,b) => {
            if (a.primerDespachoTs && b.primerDespachoTs) return a.primerDespachoTs - b.primerDespachoTs;
            if (a.primerDespachoTs) return -1;
            if (b.primerDespachoTs) return 1;
            return 0;
        });
        result.push({ id:"_sin_asignar", nombre:"Sin Asignar", capataz:null, viviendas:sinAsignar, colorIdx:-1 });
    }
    return result;
}

// Resumen de un grupo
function grupoResumen(vivs) {
    const n = vivs.length;
    const pctDesp = n ? Math.round(vivs.reduce((s,v)=>s+v.pctDesp,0)/n) : 0;
    const pctInsp = n ? Math.round(vivs.reduce((s,v)=>s+v.pctInsp,0)/n) : 0;
    const criticas = vivs.filter(v=>v.estadoGeneral==="critico").length;
    const terminadas = vivs.filter(v=>v.estadoGeneral==="terminada").length;
    return { n, pctDesp, pctInsp, criticas, terminadas };
}

                        </div>
                        <div className="grid grid-cols-3 gap-1 text-[10px]">
                            <div><span className="text-green-600 font-semibold">Pagado</span><br/><span className="font-mono font-bold text-gray-700">{formatUF(eepp.pagado)}</span></div>
                            <div><span className="text-yellow-600 font-semibold">Ingresado</span><br/><span className="font-mono font-bold text-gray-700">{formatUF(eepp.ingresado)}</span></div>
                            <div><span className="text-gray-500 font-semibold">Total</span><br/><span className="font-mono font-bold text-gray-700">{formatUF(total)}</span></div>
                        </div>
                    </div>
                ) : <p className="text-gray-400 text-xs">Sin EP registrados</p>}
            </div>
        </div>
    );
};

// -- Timeline --
const LineaTiempo = ({ etapas }) => (
    <div className="flex items-stretch gap-0.5 overflow-x-auto hide-scrollbar">
        {ETAPAS.map((et, idx) => {
            const info = etapas[et.key];
            return (
                <React.Fragment key={et.key}>
                    <div className={`flex flex-col items-center rounded-lg px-2 py-1.5 ${coloresEstado[info?.estado||"bloqueado"]}`} style={{minWidth:"72px"}}>
                        <span className="text-xs font-bold">
                            {info?.estado==="despachado" ? `Día ${info.dias}` : info?.estado==="solicitado" ? `S${info.dias}d` : info?.estado==="bloqueado" ? "—" : `+${info?.dias||0}d`}
                        </span>
                        <span className="text-[10px] leading-tight text-center mt-0.5">{et.nombre}</span>
                        {info?.estado==="despachado" && info?.guia && <span className="text-[9px] opacity-75">#{info.guia}</span>}
                        {info?.estado==="solicitado" && <span className="text-[9px] opacity-75">Solicitado</span>}

                    {idx < ETAPAS.length-1 && (
                        <div className="flex items-center">
                            <div className={`w-3 h-0.5 ${info?.estado==="despachado"?"bg-blue-400":info?.estado==="solicitado"?"bg-purple-400":"bg-gray-200"}`}/>

                            <div className={`w-3 h-0.5 ${etapas[ETAPAS[idx+1]?.key]?.estado==="despachado"?"bg-blue-400":etapas[ETAPAS[idx+1]?.key]?.estado==="solicitado"?"bg-purple-400":"bg-gray-200"}`}/>
                        </div>
                    )}

            );

    </div>
);

// -- Grupo Header (barra separadora entre grupos) --

    if (!grupo.nombre) return null; // sin grupos, no mostrar header
    const c = colorIdx >= 0 ? GRUPO_COLORS[colorIdx] : { bg:"bg-gray-50", border:"border-gray-200", text:"text-gray-600", accent:"bg-gray-400", light:"bg-gray-100" };
    const res = grupoResumen(grupo.viviendas);
    return (
        <div className={`${c.bg} border ${c.border} rounded-xl p-3 cursor-pointer hover:shadow-sm transition-shadow`} onClick={onToggle}>
            <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                    <div className={`w-8 h-8 ${c.accent} rounded-lg flex items-center justify-center`}>
                        <span className="text-white text-xs font-bold">{grupo.nombre.replace("Grupo ","G")}</span>
                    </div>
                    <div>
                        <div className="flex items-center gap-2">
                            <h3 className={`text-sm font-bold ${c.text}`}>{grupo.nombre}</h3>
                            {grupo.capataz && <span className="text-xs text-gray-500">— Capataz: <strong className="text-gray-700">{grupo.capataz}</strong></span>}
                        </div>
                        <div className="flex items-center gap-4 text-[10px] text-gray-500 mt-0.5">
                            <span>{res.n} viviendas</span>
                            <span>Desp: <strong className="text-blue-600">{res.pctDesp}%</strong></span>
                            <span>Insp: <strong className="text-emerald-600">{res.pctInsp}%</strong></span>
                            {res.criticas > 0 && <span className="text-red-600 font-semibold">{res.criticas} críticas</span>}
                            {res.terminadas > 0 && <span className="text-green-600">{res.terminadas} terminadas</span>}
                        </div>
                    </div>
                </div>
                <div className="flex items-center gap-3">
                    {/* Mini barra avance del grupo */}
                    <div className="w-24 space-y-0.5">
                        <div className="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden"><div className="h-full rounded-full bg-blue-500" style={{width:`${res.pctDesp}%`}}/></div>
                        <div className="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden"><div className="h-full rounded-full bg-emerald-500" style={{width:`${res.pctInsp}%`}}/></div>

};

// -- ViviendaCard --

                            {alertasRojas.length===0 && alertasNaranjas.length > 0 && <span className="inline-flex items-center gap-1 text-[10px] font-bold text-orange-600 bg-orange-50 border border-orange-200 rounded-full px-1.5 py-0.5">{alertasNaranjas.length} alerta{alertasNaranjas.length>1?"s":""}</span>}

                    </div>
                    <div className="flex items-center gap-3">
                        <div className="flex items-center gap-1"><IconEye/><span className={v.pctInsp>=90?"text-green-600":v.pctInsp>=50?"text-blue-600":"text-orange-500"}>Insp: {v.pctInsp}%</span></div>
                        {solicitadas.length > 0 && <span className="text-[10px] bg-purple-50 text-purple-700 px-2 py-0.5 rounded-full border border-purple-200">{solicitadas.length} solicitada{solicitadas.length>1?"s":""}</span>}
                    </div>
                </div>
                {alertasRojas.length > 0 && <div className="mt-3 p-2 bg-red-50 border border-red-300 rounded-lg">{alertasRojas.map((a,i)=><div key={i} className="flex items-center gap-2 text-red-700 text-sm"><span className="pulse-soft"><IconWarning/></span><span><strong>{a.etapa}:</strong> {a.msg}</span></div>)}</div>}

                {v.estadoGeneral==="critico" && v.proximaCritica && alertasRojas.length===0 && <div className="mt-3 p-2 bg-red-50 border border-red-200 rounded-lg"><div className="flex items-center gap-2 text-red-600 text-sm"><span className="pulse-soft"><IconWarning/></span><span><strong>{v.proximaCritica.nombre}</strong> atrasado {v.proximaCritica.atraso} días</span></div></div>}
            </div>
            {expanded && (
                <div className="border-t border-gray-100 p-4 bg-gray-50">
                    <h4 className="text-sm font-medium text-gray-700 mb-3">Detalle de Etapas (Despachos)</h4>
                    <div className="space-y-2 mb-4">{ETAPAS.map(et=>{const info=v.etapas[et.key];return(<div key={et.key} className="flex items-center gap-3 text-sm"><div className={`w-8 h-8 rounded-full ${coloresChip[info.estado]} flex items-center justify-center text-white text-xs font-bold shadow`}>{info.estado==="solicitado"?"S":et.codigo}</div><span className="text-gray-700 flex-1">{et.nombre}</span><span className="text-gray-500">{info.estado==="despachado"&&`Guía #${info.guia} — ${info.dias}d`}{info.estado==="solicitado"&&<span className="text-purple-600">Solicitado hace {info.dias}d — esperando despacho</span>}{info.estado==="critico"&&<span className="text-red-600">{info.dias}d</span>}{info.estado==="atencion"&&<span className="text-yellow-600">{info.dias}d</span>}{info.estado==="en_tiempo"&&<span className="text-green-600">{info.dias}d</span>}{info.estado==="bloqueado"&&"Bloqueado"}</span></div>);})}</div>

                        <div className="grid grid-cols-7 sm:grid-cols-14 gap-1">{["Fundaciones","Radier","Alcantarillado","Tabiques","Techumbre","Rev. Exterior","Ventanas","Cubierta","Cielo","Alero","Red Agua Pot.","Rev. Zona Seca","Cerámico Piso","Pintura Ext."].map(p=>{const pct=Math.floor(Math.random()*101);return(<div key={p} className={`text-center rounded p-1 ${pct>=100?"bg-green-100 text-green-700 border border-green-200":pct>0?"bg-yellow-50 text-yellow-700 border border-yellow-200":"bg-gray-50 text-gray-400 border border-gray-200"}`} title={`${p}: ${pct}%`}><div className="font-mono text-[9px] leading-tight">{p}</div><div className="font-bold text-[10px]">{pct}%</div></div>);})}</div>

// -- Tab Viviendas con Grupos --
const ViviendasTab = ({ viviendas, grupos, expandida, setExpandida, filtro, setFiltro }) => {
    const terminadas=viviendas.filter(v=>v.estadoGeneral==="terminada").length;
    const criticas=viviendas.filter(v=>v.estadoGeneral==="critico").length;
    const atencion_=viviendas.filter(v=>v.estadoGeneral==="atencion").length;
    const enTiempo=viviendas.filter(v=>v.estadoGeneral==="en_tiempo").length;

    const vivFiltradas = filtro==="todos" ? viviendas : viviendas.filter(v=>v.estadoGeneral===filtro);
    const gruposData = agruparViviendas(vivFiltradas, grupos);
    const [gruposAbiertos, setGruposAbiertos] = React.useState(() => {
        const init = {};
        gruposData.forEach(g => init[g.id] = true);
        return init;
    });
    const toggleGrupo = (gid) => setGruposAbiertos(prev => ({...prev, [gid]:!prev[gid]}));

    return (
        <div>
            <div className="flex items-center gap-2 mb-4">
                {[["todos","Todas",viviendas.length],["critico","Críticas",criticas],["atencion","Atención",atencion_],["en_tiempo","En Tiempo",enTiempo],["terminada","Terminadas",terminadas]].map(([k,l,c])=>
                    <button key={k} onClick={()=>setFiltro(k)} className={`px-3 py-1.5 rounded-lg text-xs font-medium ${filtro===k?"bg-violet-600 text-white shadow-sm":"bg-white text-gray-500 border border-gray-200 hover:border-gray-300"}`}>{l} <span className="ml-1 opacity-60">{c}</span></button>
                )}
            </div>
            <div className="space-y-3">
                {gruposData.map(grupo => (
                    <div key={grupo.id}>
                        <GrupoHeader grupo={grupo} colorIdx={grupo.colorIdx} open={gruposAbiertos[grupo.id] !== false} onToggle={()=>toggleGrupo(grupo.id)}/>
                        {(gruposAbiertos[grupo.id] !== false) && (
                            <div className={`space-y-2 ${grupo.nombre ? "ml-2 pl-3 border-l-2 " + (grupo.colorIdx >= 0 ? GRUPO_COLORS[grupo.colorIdx].border : "border-gray-200") : ""} mt-2`}>
                                {grupo.viviendas.map(v =>
                                    <ViviendaCard key={v.id} v={v} expanded={expandida===v.id} onToggle={()=>setExpandida(expandida===v.id?null:v.id)} grupoColor={grupo.colorIdx}/>
                                )}
                            </div>
                        )}
                    </div>
                ))}
            </div>
        </div>
    );
};


// -- Matriz con Grupos --

                            {ETAPAS.map(et=><th key={et.key} className="py-2 px-2 text-gray-500 text-center font-medium">{et.nombre}</th>)}
                            <th className="py-2 px-2 text-gray-500 text-center font-medium">Desp%</th>

                            <React.Fragment key={grupo.id}>

                                        <td colSpan={ETAPAS.length + 3} className="py-2 px-3">
                                            <div className="flex items-center gap-2">
                                                {grupo.colorIdx >= 0 && <div className={`w-3 h-3 rounded ${GRUPO_COLORS[grupo.colorIdx].accent}`}/>}
                                                <span className={`text-xs font-bold ${grupo.colorIdx >= 0 ? GRUPO_COLORS[grupo.colorIdx].text : "text-gray-600"}`}>{grupo.nombre}</span>
                                                {grupo.capataz && <span className="text-[10px] text-gray-500">— {grupo.capataz}</span>}

                                            </div>
                                        </td>
                                    </tr>
                                )}
                                {grupo.viviendas.map(v=>
                                    <tr key={v.id} className="border-b border-gray-100 hover:bg-blue-50/30">
                                        <td className="py-1.5 px-3 text-gray-700 font-medium sticky left-0 bg-white z-10 whitespace-nowrap">
                                            <div className="flex items-center gap-1.5">
                                                {grupo.colorIdx >= 0 && <div className={`w-1 h-4 rounded-full ${GRUPO_COLORS[grupo.colorIdx].accent}`}/>}
                                                {v.nombre}
                                            </div>
                                        </td>
                                        {ETAPAS.map(et=>{const info=v.etapas[et.key];return <td key={et.key} className="py-1 px-1 text-center"><span className={`inline-block w-full py-1 rounded text-[10px] font-bold ${coloresEstado[info.estado]}`}>{info.estado==="despachado"?`D${info.dias}`:info.estado==="solicitado"?`S${info.dias}`:info.estado==="bloqueado"?"—":`+${info.dias}d`}</span></td>;})}

                                    </tr>
                                )}

                        ))}
                    </tbody>
                </table>
            </div>

};

// -- Distribución --
const Distribucion = ({viviendas}) => {
    const data = ETAPAS.map(et=>({...et,d:viviendas.filter(v=>v.etapas[et.key].estado==="despachado").length,s:viviendas.filter(v=>v.etapas[et.key].estado==="solicitado").length,e:viviendas.filter(v=>["en_tiempo","atencion","critico"].includes(v.etapas[et.key].estado)).length,c:viviendas.filter(v=>v.etapas[et.key].estado==="critico").length,total:viviendas.length}));

lex justify-between"><span className="text-gray-500">Días sin pago</span><span className={`font-mono ${x.diasDesdeUltimo>60?'text-red-600 font-bold':x.diasDesdeUltimo>30?'text-orange-500':'text-gray-700'}`}>{x.diasDesdeUltimo}</span></div></div></div></div></td></tr>}

// -- Configuración --
const ConfiguracionView = ({ grupos, setGrupos, viviendas }) => {
    const [subTab, setSubTab] = React.useState("grupos");
    const NODE_W=150, NODE_H=80, LEVEL_GAP=70, NODE_GAP=16;

    // Diagrama
    const niveles = {};
    ETAPAS.forEach(et => { if (!et.dependencia) niveles[et.key] = 0; });
    let changed = true;
    while (changed) { changed = false; ETAPAS.forEach(et => { if (et.dependencia && niveles[et.dependencia] !== undefined && niveles[et.key] === undefined) { niveles[et.key] = niveles[et.dependencia] + 1; changed = true; } }); }
    const porNivel = {};
    Object.entries(niveles).forEach(([k,n]) => { if (!porNivel[n]) porNivel[n] = []; porNivel[n].push(k); });
    const maxNivel = Math.max(...Object.keys(porNivel).map(Number), 0);
    const maxNodes = Math.max(...Object.values(porNivel).map(a=>a.length), 1);
    const svgH = Math.max(maxNodes*(NODE_H+NODE_GAP)+40, 300);
    const svgW = (maxNivel+1)*(NODE_W+LEVEL_GAP)+60;
    const positions = {};
    Object.entries(porNivel).forEach(([nivel, keys]) => {
        const n = Number(nivel);
        const totalH = keys.length*NODE_H + (keys.length-1)*NODE_GAP;
        const startY = (svgH-totalH)/2;
        keys.forEach((k,i) => { positions[k] = { x:30+n*(NODE_W+LEVEL_GAP), y:startY+i*(NODE_H+NODE_GAP) }; });
    });
    const etapaMap = {}; ETAPAS.forEach(e => etapaMap[e.key] = e);
    const secuencia = ETAPAS.filter(e=>e.critico).map(e=>e.key);

    // Grupos editor state
    const [editingGrupos, setEditingGrupos] = React.useState(JSON.parse(JSON.stringify(grupos)));
    const [nuevoGrupoNombre, setNuevoGrupoNombre] = React.useState("");
    const [nuevoGrupoCapataz, setNuevoGrupoCapataz] = React.useState("");

    const asignados = new Set();
    editingGrupos.forEach(g => g.beneficiarios.forEach(b => asignados.add(b)));
    const sinAsignar = viviendas.filter(v => !asignados.has(v.id));

    const agregarGrupo = () => {
        if (!nuevoGrupoNombre.trim()) return;
        const newId = "G" + (editingGrupos.length + 1);
        setEditingGrupos([...editingGrupos, { id:newId, nombre:nuevoGrupoNombre.trim(), capataz:nuevoGrupoCapataz.trim(), beneficiarios:[] }]);
        setNuevoGrupoNombre("");
        setNuevoGrupoCapataz("");
    };

    const moverAGrupo = (benefId, grupoId) => {
        setEditingGrupos(prev => prev.map(g => ({
            ...g,
            beneficiarios: g.id === grupoId
                ? [...g.beneficiarios, benefId]
                : g.beneficiarios.filter(b => b !== benefId)
        })));
    };

    const quitarDeGrupo = (benefId, grupoId) => {
        setEditingGrupos(prev => prev.map(g =>
            g.id === grupoId ? {...g, beneficiarios: g.beneficiarios.filter(b => b !== benefId)} : g
        ));
    };

    const eliminarGrupo = (grupoId) => {
        setEditingGrupos(prev => prev.filter(g => g.id !== grupoId));
    };

    const aplicarCambios = () => {
        setGrupos(editingGrupos);
    };

    return (
        <div className="space-y-4">
            <div className="flex gap-2 mb-2">
                {[["grupos","Grupos de Trabajo"],["diagrama","Diagrama de Dependencias"],["editor","Editor de Tiempos"]].map(([k,l])=>
                    <button key={k} onClick={()=>setSubTab(k)} className={`px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 ${subTab===k?"bg-violet-600 text-white shadow-sm":"bg-white text-gray-500 border border-gray-200"}`}>
                        {k==="grupos" && <IconGroup/>}
                        {l}
                    </button>
                )}
            </div>

            {/* ========== SUB-TAB: GRUPOS ========== */}
            {subTab === "grupos" && (
                <div className="space-y-4">
                    {/* Explicación */}
                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
                        <h3 className="text-sm font-semibold text-blue-800 mb-1">Grupos de Trabajo por Capataz</h3>
                        <p className="text-xs text-blue-600 leading-relaxed">
                            Agrupa beneficiarios bajo un capataz. Cada grupo debe avanzar en un estado similar.
                            Los beneficiarios sin grupo se ordenan automáticamente por fecha de primer despacho.
                            Los grupos se reflejan en las pestañas Viviendas y Matriz.
                        </p>
                    </div>

                    {/* Crear nuevo grupo */}
                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
                        <h4 className="text-sm font-semibold text-gray-700 mb-3">Crear Nuevo Grupo</h4>
                        <div className="flex items-end gap-3">
                            <div className="flex-1">
                                <label className="text-[10px] text-gray-500 font-medium">Nombre del Grupo</label>
                                <input type="text" value={nuevoGrupoNombre} onChange={e=>setNuevoGrupoNombre(e.target.value)} placeholder="Ej: Grupo 4" className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 mt-0.5"/>
                            </div>
                            <div className="flex-1">
                                <label className="text-[10px] text-gray-500 font-medium">Capataz</label>
                                <input type="text" value={nuevoGrupoCapataz} onChange={e=>setNuevoGrupoCapataz(e.target.value)} placeholder="Ej: Roberto Figueroa" className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 mt-0.5"/>
                            </div>
                            <button onClick={agregarGrupo} className="px-4 py-2 bg-violet-600 text-white rounded-lg text-sm font-medium hover:bg-violet-700 transition-colors whitespace-nowrap">+ Crear Grupo</button>
                        </div>
                    </div>

                    {/* Grupos existentes */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        {editingGrupos.map((grupo, gIdx) => {
                            const c = GRUPO_COLORS[gIdx % GRUPO_COLORS.length];
                            const gVivs = grupo.beneficiarios.map(bid => viviendas.find(v=>v.id===bid)).filter(Boolean);
                            const res = grupoResumen(gVivs);
                            return (
                                <div key={grupo.id} className={`${c.bg} border ${c.border} rounded-xl overflow-hidden`}>
                                    <div className="p-3 flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <div className={`w-7 h-7 ${c.accent} rounded-lg flex items-center justify-center`}>
                                                <span className="text-white text-[10px] font-bold">{grupo.id}</span>
                                            </div>
                                            <div>
                                                <h4 className={`text-sm font-bold ${c.text}`}>{grupo.nombre}</h4>
                                                {grupo.capataz && <p className="text-[10px] text-gray-500">Capataz: {grupo.capataz}</p>}
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-[10px] text-gray-500">{res.n} viv. — Desp: {res.pctDesp}%</span>
                                            <button onClick={()=>eliminarGrupo(grupo.id)} className="text-red-400 hover:text-red-600 text-xs px-1.5 py-0.5 rounded hover:bg-red-50" title="Eliminar grupo">x</button>
                                        </div>
                                    </div>
                                    <div className="bg-white/70 p-2 space-y-1 max-h-[200px] overflow-y-auto">
                                        {gVivs.length === 0 && <p className="text-xs text-gray-400 text-center py-3">Sin beneficiarios asignados</p>}
                                        {gVivs.map(v => (
                                            <div key={v.id} className="flex items-center justify-between px-2 py-1 rounded hover:bg-gray-50 text-xs group">
                                                <div className="flex items-center gap-2">
                                                    <span className={`w-2 h-2 rounded-full ${coloresChip[v.estadoGeneral]}`}/>
                                                    <span className="text-gray-700 font-medium">{v.nombre}</span>
                                                    <span className="text-gray-400">{v.tipologia}</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-gray-400 font-mono text-[10px]">{v.pctDesp}%</span>
                                                    <button onClick={()=>quitarDeGrupo(v.id, grupo.id)} className="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity text-[10px]">quitar</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {/* Drop zone: select from sin asignar */}
                                    {sinAsignar.length > 0 && (
                                        <div className="p-2 border-t border-gray-100">
                                            <select className="w-full text-xs border border-gray-200 rounded px-2 py-1.5 bg-white text-gray-500 focus:outline-none focus:ring-1 focus:ring-violet-400" defaultValue="" onChange={e => { if(e.target.value) { moverAGrupo(e.target.value, grupo.id); e.target.value=""; } }}>
                                                <option value="">+ Agregar beneficiario...</option>
                                                {sinAsignar.map(v => <option key={v.id} value={v.id}>{v.nombre} ({v.tipologia}) — {v.pctDesp}%</option>)}
                                            </select>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* Sin asignar */}
                    {sinAsignar.length > 0 && (
                        <div className="bg-white rounded-xl border border-dashed border-gray-300 p-4">
                            <div className="flex items-center justify-between mb-3">
                                <h4 className="text-sm font-semibold text-gray-500">Sin Asignar a Grupo</h4>
                                <span className="text-xs text-gray-400">{sinAsignar.length} beneficiarios — se ordenan por fecha de primer despacho</span>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
                                {sinAsignar.map(v => (
                                    <div key={v.id} className="flex items-center gap-2 px-2 py-1.5 rounded border border-gray-200 text-xs bg-gray-50 hover:bg-gray-100">
                                        <span className={`w-2 h-2 rounded-full ${coloresChip[v.estadoGeneral]}`}/>
                                        <span className="text-gray-700 font-medium truncate">{v.nombre}</span>
                                        <span className="text-gray-400 font-mono text-[10px] ml-auto">{v.pctDesp}%</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Botón aplicar */}
                    <div className="flex items-center justify-between bg-gray-50 rounded-xl border border-gray-200 p-4">
                        <p className="text-[10px] text-gray-400">Los cambios se reflejan en las pestañas Viviendas y Matriz al aplicar</p>
                        <div className="flex gap-2">
                            <button onClick={()=>setEditingGrupos(JSON.parse(JSON.stringify(grupos)))} className="px-3 py-1.5 text-xs bg-gray-200 text-gray-600 rounded-lg hover:bg-gray-300">Descartar</button>
                            <button onClick={aplicarCambios} className="px-4 py-1.5 text-xs bg-violet-600 text-white rounded-lg hover:bg-violet-700 font-medium">Aplicar Grupos</button>
                        </div>
                    </div>
                </div>
            )}

            {/* ========== SUB-TAB: DIAGRAMA ========== */}
            {subTab === "diagrama" && (
                <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4 overflow-auto">
                    <h3 className="text-sm font-semibold text-gray-700 mb-3">Ruta Crítica y Dependencias entre Etapas</h3>
                    <svg width={svgW} height={svgH} className="block">
                        {ETAPAS.map(et => {
                            if (!et.dependencia || !positions[et.dependencia] || !positions[et.key]) return null;
                            const from=positions[et.dependencia], to=positions[et.key];
                            const x1=from.x+NODE_W, y1=from.y+NODE_H/2, x2=to.x, y2=to.y+NODE_H/2, midX=(x1+x2)/2;
                            const isCrit = secuencia.includes(et.key) && secuencia.includes(et.dependencia);
                            return (<g key={`c-${et.key}`}><path d={`M${x1},${y1} C${midX},${y1} ${midX},${y2} ${x2},${y2}`} fill="none" stroke={isCrit?"#8b5cf6":"#d1d5db"} strokeWidth={isCrit?2.5:1.5}/><polygon points={`${x2},${y2} ${x2-8},${y2-4} ${x2-8},${y2+4}`} fill={isCrit?"#8b5cf6":"#d1d5db"}/></g>);
                        })}
                        {ETAPAS.map(et => {
                            const pos=positions[et.key]; if (!pos) return null;
                            const crit=et.critico;
                            return (<g key={et.key} transform={`translate(${pos.x},${pos.y})`}>
                                <rect width={NODE_W} height={NODE_H} rx={8} fill={crit?"#faf5ff":"white"} stroke={crit?"#8b5cf6":"#e5e7eb"} strokeWidth={crit?2.5:1.5}/>
                                <text x={NODE_W/2} y={20} textAnchor="middle" fontSize="11" fontWeight="600" fill={crit?"#6d28d9":"#374151"}>{et.nombre}</text>
                                <text x={NODE_W/2} y={35} textAnchor="middle" fontSize="10" fill="#9ca3af" fontFamily="IBM Plex Mono">{et.codigo} {crit?"| CRÍTICO":""}</text>
                                <text x={NODE_W/2} y={52} textAnchor="middle" fontSize="10" fill="#6b7280">Duración: {et.duracion}d</text>
                                {et.tiempo_optimo !== null && <g>
                                    <rect x={10} y={60} width={(NODE_W-20)*0.5} height={6} rx={3} fill="#22c55e" opacity={0.6}/>
                                    <rect x={10+(NODE_W-20)*0.5} y={60} width={(NODE_W-20)*0.5} height={6} rx={3} fill="#eab308" opacity={0.6}/>
                                    <text x={18} y={69} fontSize="8" fill="#166534">{et.tiempo_optimo}d</text>
                                    <text x={NODE_W-30} y={69} fontSize="8" fill="#854d0e">{et.tiempo_alerta}d</text>
                                </g>}
                            </g>);
                        })}
                    </svg>
                    <div className="flex items-center gap-6 mt-4 pt-3 border-t border-gray-100 text-[10px] text-gray-500">
                        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded border-2 border-violet-500 bg-violet-50"></span> Ruta Crítica</span>
                        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded border border-gray-300 bg-white"></span> Flexible</span>
                        <span className="flex items-center gap-1.5"><span className="w-8 h-1.5 rounded bg-green-500 opacity-60"></span> Tiempo óptimo</span>
                        <span className="flex items-center gap-1.5"><span className="w-8 h-1.5 rounded bg-yellow-500 opacity-60"></span> Tiempo alerta</span>
                    </div>
                </div>
            )}

            {/* ========== SUB-TAB: EDITOR ========== */}
            {subTab === "editor" && (
                <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                    <div className="px-4 py-3 bg-gray-50 border-b border-gray-200"><h3 className="text-sm font-semibold text-gray-700">Editor de Tiempos por Etapa</h3><p className="text-[10px] text-gray-400">Modifica duración, tiempos óptimo y de alerta</p></div>
                    <table className="w-full text-xs">
                        <thead><tr className="bg-gray-50 border-b border-gray-200 text-gray-500"><th className="py-2 px-3 text-left">Etapa</th><th className="py-2 px-3 text-center">Código</th><th className="py-2 px-3 text-center">Ruta Crítica</th><th className="py-2 px-3 text-center">Dependencia</th><th className="py-2 px-3 text-center">Duración (d)</th><th className="py-2 px-3 text-center">T. Óptimo (d)</th><th className="py-2 px-3 text-center">T. Alerta (d)</th></tr></thead>
                        <tbody>{ETAPAS.map(et=>(
                            <tr key={et.key} className={`border-b border-gray-100 ${et.critico?"bg-violet-50/30":""}`}>
                                <td className="py-2 px-3 font-medium text-gray-700">{et.nombre}</td>
                                <td className="py-2 px-3 text-center font-mono text-gray-500">{et.codigo}</td>
                                <td className="py-2 px-3 text-center">{et.critico ? <span className="bg-violet-100 text-violet-700 px-2 py-0.5 rounded-full text-[10px] font-bold">SÍ</span> : <span className="text-gray-400">No</span>}</td>
                                <td className="py-2 px-3 text-center font-mono text-gray-500">{et.dependencia ? etapaMap[et.dependencia]?.nombre : "—"}</td>
                                <td className="py-2 px-3 text-center"><input type="number" defaultValue={et.duracion} className="w-16 text-center border border-gray-300 rounded px-1 py-0.5 text-xs"/></td>
                                <td className="py-2 px-3 text-center"><input type="number" defaultValue={et.tiempo_optimo} className="w-16 text-center border border-gray-300 rounded px-1 py-0.5 text-xs bg-green-50"/></td>
                                <td className="py-2 px-3 text-center"><input type="number" defaultValue={et.tiempo_alerta} className="w-16 text-center border border-gray-300 rounded px-1 py-0.5 text-xs bg-yellow-50"/></td>
                            </tr>
                        ))}</tbody>
                    </table>
                    <div className="px-4 py-3 bg-gray-50 border-t border-gray-200 flex items-center justify-between">
                        <p className="text-[10px] text-gray-400">Para aplicar cambios: exportar JSON → reemplazar config/etapas_config.json → regenerar</p>
                        <div className="flex gap-2">
                            <button className="px-3 py-1.5 text-xs bg-gray-200 text-gray-600 rounded-lg hover:bg-gray-300">Restaurar</button>
                            <button className="px-3 py-1.5 text-xs bg-violet-600 text-white rounded-lg hover:bg-violet-700">Exportar JSON</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

// ========== APP ==========
const App = () => {
    const [proyectoSel,setProyectoSel] = React.useState("P62");
    const [tab,setTab] = React.useState("viviendas");
    const [expandida,setExpandida] = React.useState(null);
    const [filtro,setFiltro] = React.useState("todos");
    const [gruposConfig, setGruposConfig] = React.useState(GRUPOS_CONFIG_INIT);

    const proy = PROYECTOS.find(p=>p.id===proyectoSel);
    const viviendas = VIV_DATA[proyectoSel]||[];
    const garantias = GARANTIAS_MOCK[proyectoSel]||[];
    const eepp = EEPP_MOCK[proyectoSel]||{pagado:0,ingresado:0,preparacion:0};
    const grupos = gruposConfig[proyectoSel] || [];

    const setGruposForProy = (newGrupos) => {
        setGruposConfig(prev => ({...prev, [proyectoSel]: newGrupos}));
    };

    const terminadas=viviendas.filter(v=>v.estadoGeneral==="terminada").length;
    const criticas=viviendas.filter(v=>v.estadoGeneral==="critico").length;
    const atencion_=viviendas.filter(v=>v.estadoGeneral==="atencion").length;
    const enTiempo=viviendas.filter(v=>v.estadoGeneral==="en_tiempo").length;
    const totalPagado=viviendas.reduce((s,v)=>s+v.totalPagado,0);
    const totalSolicitadas=viviendas.reduce((s,v)=>s+Object.values(v.etapas).filter(e=>e.estado==="solicitado").length,0);
    const diasPromedio = Math.round(viviendas.filter(v=>v.ultimaDesp).reduce((s,v)=>s+v.ultimaDesp.dias,0) / Math.max(viviendas.filter(v=>v.ultimaDesp).length,1));

    const tabs = [["viviendas","Viviendas"],["matriz","Matriz"],["distribucion","Distribución"],["financiero","Financiero"],["mano_obra","Mano de Obra"],["estados_pago","Estados de Pago"],["configuracion","Configuración"]];

    return (
        <div className="min-h-screen bg-gray-50">
            {/* TOP BAR */}
            <div className="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
                <div className="max-w-[1400px] mx-auto px-4 py-3">
                    <div className="flex items-center gap-4">
                        <div className="flex items-center gap-2"><div className="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">SC</div><span className="text-sm font-bold text-gray-600 hidden sm:inline">SCRaices</span></div>
                        <select className="bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-700 flex-1 max-w-md focus:outline-none focus:ring-2 focus:ring-violet-500" value={proyectoSel} onChange={e=>{setProyectoSel(e.target.value);setExpandida(null);setTab("viviendas");}}>
                            {PROYECTOS.map(p=><option key={p.id} value={p.id}>{p.nombre} — {p.comuna} ({p.beneficiarios} viv.)</option>)}
                        </select>
                        {grupos.length > 0 && <div className="flex items-center gap-1.5 text-xs text-gray-500"><IconGroup/><span>{grupos.length} grupos</span></div>}
                    </div>
                </div>
            </div>

            <div className="max-w-[1400px] mx-auto px-4 py-4">
                {/* HEADER: Contrato + Garantías + EP */}
                <HeaderProyecto proy={proy} garantias={garantias} eepp={eepp} />

                {/* KPIs */}
                <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 mb-4">
                    <div className="bg-white rounded-xl p-3 border border-gray-200 shadow-sm"><p className="text-[10px] text-gray-500 uppercase">Viviendas</p><p className="text-xl font-bold font-mono">{viviendas.length}</p></div>
                    <div className="bg-white rounded-xl p-3 border border-green-200 shadow-sm"><p className="text-[10px] text-green-600">Terminadas</p><p className="text-xl font-bold font-mono text-green-700">{terminadas}</p><p className="text-[9px] text-gray-400">{Math.round(terminadas/viviendas.length*100)}%</p></div>
                    <div className="bg-white rounded-xl p-3 border border-green-200 shadow-sm"><p className="text-[10px] text-green-600">En Tiempo</p><p className="text-xl font-bold font-mono text-green-600">{enTiempo}</p></div>
                    <div className="bg-white rounded-xl p-3 border border-yellow-200 shadow-sm"><p className="text-[10px] text-yellow-600">Atención</p><p className="text-xl font-bold font-mono text-yellow-600">{atencion_}</p></div>
                    <div className="bg-white rounded-xl p-3 border border-red-200 shadow-sm"><p className="text-[10px] text-red-600">Críticas</p><p className="text-xl font-bold font-mono text-red-600">{criticas}</p></div>
                    <div className="bg-white rounded-xl p-3 border border-purple-200 shadow-sm"><p className="text-[10px] text-purple-600">Solicitadas</p><p className="text-xl font-bold font-mono text-purple-600">{totalSolicitadas}</p><p className="text-[9px] text-gray-400">esperando desp.</p></div>
                    <div className="bg-white rounded-xl p-3 border border-gray-200 shadow-sm"><p className="text-[10px] text-gray-500">Días Prom.</p><p className="text-xl font-bold font-mono">{diasPromedio}d</p><p className="text-[9px] text-gray-400">Fund → última</p></div>
                    <div className="bg-white rounded-xl p-3 border border-violet-200 shadow-sm"><p className="text-[10px] text-violet-600">Total Pagado</p><p className="text-lg font-bold font-mono text-violet-700">{formatPeso(totalPagado)}</p></div>
                </div>

                {/* TABS */}
                <div className="flex items-center gap-1 mb-4 overflow-x-auto hide-scrollbar border-b border-gray-200 pb-px">
                    {tabs.map(([key,label])=><button key={key} onClick={()=>setTab(key)} className={`px-4 py-2.5 text-sm font-medium rounded-t-lg transition-colors whitespace-nowrap ${tab===key?"bg-white text-violet-700 border border-gray-200 border-b-white shadow-sm -mb-px":"text-gray-500 hover:text-gray-700 hover:bg-gray-100"}`}>
                        {label}{key==="viviendas"&&criticas>0&&<span className="ml-2 bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full">{criticas}</span>}
                        {key==="configuracion"&&grupos.length>0&&<span className="ml-1.5 bg-violet-100 text-violet-600 text-[10px] px-1.5 py-0.5 rounded-full">{grupos.length}G</span>}
                    </button>)}
                </div>

                {/* CONTENIDO */}
                <div className="min-h-[500px]">
                    {tab==="viviendas" && <ViviendasTab viviendas={viviendas} grupos={grupos} expandida={expandida} setExpandida={setExpandida} filtro={filtro} setFiltro={setFiltro}/>}
                    {tab==="matriz" && <MatrizAvance viviendas={viviendas} grupos={grupos}/>}
                    {tab==="distribucion" && <Distribucion viviendas={viviendas}/>}
                    {tab==="financiero" && <ResumenFinanciero viviendas={viviendas}/>}
                    {tab==="mano_obra" && <ManoDeObra/>}
                    {tab==="estados_pago" && <EstadosPago/>}
                    {tab==="configuracion" && <ConfiguracionView grupos={grupos} setGrupos={setGruposForProy} viviendas={viviendas}/>}
                </div>

                {/* Leyenda */}
                <div className="mt-6 flex items-center justify-center gap-6 text-[10px] text-gray-400">{[["bg-blue-500","Despachado"],["bg-purple-500","Solicitado"],["bg-green-500","En Tiempo"],["bg-yellow-500","Atención"],["bg-red-500","Crítico"],["bg-gray-300","Bloqueado"]].map(([c,l])=><span key={l} className="flex items-center gap-1.5"><span className={`w-2.5 h-2.5 rounded-full ${c}`}></span>{l}</span>)}</div>
                <p className="text-center text-[10px] text-gray-300 mt-4 mb-8">MOCKUP v3 — Vista Unificada + Grupos — Datos ficticios</p>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
