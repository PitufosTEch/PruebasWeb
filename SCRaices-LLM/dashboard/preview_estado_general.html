<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Preview — Tab Estado General</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: 'IBM Plex Sans', system-ui, sans-serif; background: #f3f4f6; }
</style>
</head>
<body>
<div class="max-w-[1400px] mx-auto p-6">
  <div class="mb-4 bg-amber-50 border border-amber-300 rounded-xl px-4 py-2 text-xs text-amber-800">
    <strong>PREVIEW ESTATICA</strong> con datos inventados. La version real esta en
    <code>index_live_v3.html</code> tab "Estado General" y usa AppSheet + Firebase en vivo.
  </div>
  <div class="bg-white border-b border-gray-200 rounded-t-xl shadow-sm px-4 py-3 mb-3">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">SC</div>
      <span class="text-sm font-bold text-gray-700">SCRaices v3 · Proyecto: Villa Los Robles — Pucón (8 viv.)</span>
    </div>
    <div class="flex gap-1 mt-3 border-b border-gray-200">
      <span class="px-3 py-1.5 text-xs text-gray-400">Viviendas</span>
      <span class="px-3 py-1.5 text-xs text-gray-400">Matriz</span>
      <span class="px-3 py-1.5 text-xs text-gray-400">Distribución</span>
      <span class="px-3 py-1.5 text-xs text-gray-400">Financiero</span>
      <span class="px-3 py-1.5 text-xs text-gray-400">M.O.</span>
      <span class="px-3 py-1.5 text-xs text-gray-400">Estados de Pago</span>
      <span class="px-3 py-1.5 text-xs font-semibold text-violet-700 border-b-2 border-violet-600">Estado General</span>
      <span class="px-3 py-1.5 text-xs text-gray-400">Configuración</span>
    </div>
  </div>
  <div id="root"></div>
</div>

<script type="text/babel">
// ===== MOCK DATA =====
const CHECKPOINTS = [
  { key: 'hpc',          label: 'HPC' },
  { key: 'te1',          label: 'TE1' },
  { key: 'visita_as',    label: 'V.AS' },
  { key: 'resol_as',     label: 'R.AS' },
  { key: 'visita_f1',    label: 'V.F1' },
  { key: 'fecha_f1',     label: 'F1' },
  { key: 't1',           label: 'T1' },
  { key: 'artefactado',  label: 'Artef.' },
  { key: 'empalme',      label: 'Empalme' },
  { key: 'visita_dom',   label: 'V.DOM' },
  { key: 'fecha_v_dom',  label: 'F.V.DOM' },
  { key: 'recepcion_dom',label: 'Recep.' },
  { key: 'fecha_recep',  label: 'F.Recep' }
];

const VIVIENDAS = [
  { id:'B-001', nom:'Pérez Soto, María Elena',    tip:'Casa 3D Villa Los Robles', pct:92, mo:4850000, com:2,
    f:{hpc:1,te1:1,visita_as:1,resol_as:1,visita_f1:1,fecha_f1:1,t1:1,artefactado:1,empalme:1,visita_dom:1,fecha_v_dom:1,recepcion_dom:1,fecha_recep:1},
    seg:{visita_as:'05/02/2026', resol_as:'14/02/2026', visita_f1:'02/03/2026', fecha_f1:'03/03/2026', t1:'10/03/2026', artefactado:'18/03/2026', empalme:'25/03/2026', visita_dom:'02/04/2026', fecha_v_dom:'03/04/2026', recepcion_dom:'RD-2026-0142', fecha_recep:'15/04/2026', obs:'Recepción sin observaciones.'},
    obsBenef:[{fecha:'2026-04-15',texto:'Recepcion firmada por la familia. OK.'},{fecha:'2026-03-20',texto:'Empalme conectado, esperando V.DOM.'}]
  },
  { id:'B-002', nom:'González Rojas, Juan Carlos', tip:'Casa 2D Villa Los Robles', pct:74, mo:3920000, com:1,
    f:{hpc:1,te1:1,visita_as:1,resol_as:1,visita_f1:1,fecha_f1:1,t1:1,artefactado:1,empalme:1,visita_dom:1,fecha_v_dom:1,recepcion_dom:0,fecha_recep:0},
    seg:{visita_as:'10/02/2026', resol_as:'20/02/2026', visita_f1:'05/03/2026', fecha_f1:'06/03/2026', t1:'15/03/2026', artefactado:'22/03/2026', empalme:'30/03/2026', visita_dom:'08/04/2026', fecha_v_dom:'09/04/2026', recepcion_dom:'', fecha_recep:'', obs:'Pendiente N° de recepción DOM.'},
    obsBenef:[{fecha:'2026-04-09',texto:'V.DOM realizada. Esperando emision N° Recep.'}]
  },
  { id:'B-003', nom:'Muñoz Díaz, Ana Patricia',    tip:'Casa 3D + RC', pct:58, mo:2640000, com:1,
    f:{hpc:1,te1:1,visita_as:1,resol_as:1,visita_f1:1,fecha_f1:1,t1:1,artefactado:0,empalme:1,visita_dom:0,fecha_v_dom:0,recepcion_dom:0,fecha_recep:0},
    seg:{visita_as:'15/02/2026', resol_as:'25/02/2026', visita_f1:'12/03/2026', fecha_f1:'13/03/2026', t1:'22/03/2026', artefactado:'', empalme:'02/04/2026', visita_dom:'', fecha_v_dom:'', recepcion_dom:'', fecha_recep:'', obs:'Falta artefactado de baño.'},
    obsBenef:[{fecha:'2026-04-05',texto:'Artef. baño retrasado por logística.'}]
  },
  { id:'B-004', nom:'Soto Pino, Carlos Eduardo',   tip:'Casa 2D', pct:34, mo:1180000, com:0,
    f:{hpc:1,te1:1,visita_as:1,resol_as:1,visita_f1:0,fecha_f1:0,t1:0,artefactado:0,empalme:0,visita_dom:0,fecha_v_dom:0,recepcion_dom:0,fecha_recep:0},
    seg:{visita_as:'20/02/2026', resol_as:'02/03/2026', visita_f1:'', fecha_f1:'', t1:'', artefactado:'', empalme:'', visita_dom:'', fecha_v_dom:'', recepcion_dom:'', fecha_recep:'', obs:''},
    obsBenef:[]
  },
  { id:'B-005', nom:'Vargas Lobos, Patricia',      tip:'Casa 3D', pct:42, mo:1450000, com:3,
    f:{hpc:1,te1:1,visita_as:1,resol_as:0,visita_f1:0,fecha_f1:0,t1:0,artefactado:0,empalme:0,visita_dom:0,fecha_v_dom:0,recepcion_dom:0,fecha_recep:0},
    seg:{visita_as:'01/03/2026', resol_as:'', visita_f1:'', fecha_f1:'', t1:'', artefactado:'', empalme:'', visita_dom:'', fecha_v_dom:'', recepcion_dom:'', fecha_recep:'', obs:'Resolucion AS rechazada, reingreso 12/03.'},
    obsBenef:[{fecha:'2026-03-12',texto:'Reingreso resolución AS con correcciones.'},{fecha:'2026-03-05',texto:'Rechazo inicial, revisar planos.'},{fecha:'2026-02-28',texto:'AS observada por servicios.'}]
  },
  { id:'B-006', nom:'Henríquez Aros, Marta',       tip:'Casa 2D', pct:18, mo:520000,  com:0,
    f:{hpc:1,te1:0,visita_as:0,resol_as:0,visita_f1:0,fecha_f1:0,t1:0,artefactado:0,empalme:0,visita_dom:0,fecha_v_dom:0,recepcion_dom:0,fecha_recep:0},
    seg:{visita_as:'', resol_as:'', visita_f1:'', fecha_f1:'', t1:'', artefactado:'', empalme:'', visita_dom:'', fecha_v_dom:'', recepcion_dom:'', fecha_recep:'', obs:''},
    obsBenef:[]
  },
  { id:'B-007', nom:'Quintana Soto, Pedro',        tip:'Casa 3D', pct:0,  mo:0,       com:1,
    f:{hpc:0,te1:0,visita_as:0,resol_as:0,visita_f1:0,fecha_f1:0,t1:0,artefactado:0,empalme:0,visita_dom:0,fecha_v_dom:0,recepcion_dom:0,fecha_recep:0},
    seg:{visita_as:'', resol_as:'', visita_f1:'', fecha_f1:'', t1:'', artefactado:'', empalme:'', visita_dom:'', fecha_v_dom:'', recepcion_dom:'', fecha_recep:'', obs:'Sin HPC. Pendiente subsidio.'},
    obsBenef:[]
  },
  { id:'B-008', nom:'Reyes Cárcamo, Luis Alberto', tip:'Casa 2D + RC', pct:88, mo:4220000, com:2,
    f:{hpc:1,te1:1,visita_as:1,resol_as:1,visita_f1:1,fecha_f1:1,t1:1,artefactado:1,empalme:1,visita_dom:1,fecha_v_dom:1,recepcion_dom:1,fecha_recep:1},
    seg:{visita_as:'12/02/2026', resol_as:'22/02/2026', visita_f1:'08/03/2026', fecha_f1:'09/03/2026', t1:'18/03/2026', artefactado:'26/03/2026', empalme:'02/04/2026', visita_dom:'10/04/2026', fecha_v_dom:'11/04/2026', recepcion_dom:'RD-2026-0156', fecha_recep:'22/04/2026', obs:'OK.'},
    obsBenef:[{fecha:'2026-04-22',texto:'Recep. definitiva firmada.'},{fecha:'2026-04-11',texto:'V.DOM positiva.'}]
  }
];

const MO_MENSUAL = [
  {ym:'2025-11', v: 1200000},
  {ym:'2025-12', v: 2400000},
  {ym:'2026-01', v: 3100000},
  {ym:'2026-02', v: 4500000},
  {ym:'2026-03', v: 5200000},
  {ym:'2026-04', v: 6800000},
  {ym:'2026-05', v: 1080000}
];

const DESP_MENSUAL = [
  {ym:'2025-11', v: 8},
  {ym:'2025-12', v: 14},
  {ym:'2026-01', v: 21},
  {ym:'2026-02', v: 28},
  {ym:'2026-03', v: 35},
  {ym:'2026-04', v: 31},
  {ym:'2026-05', v: 7}
];

// ===== UTILS =====
const formatPeso = (n) => "$" + Number(n).toLocaleString("es-CL");
const fmtCorto = (n) => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'k' : String(n);
const fmtMes = (ym) => {
  if (!ym) return '';
  const [y, m] = ym.split('-');
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${meses[parseInt(m,10)-1]}'${y.slice(2)}`;
};

// ===== COMPONENTE =====
const EstadoGeneralPreview = () => {
  const [expandida, setExpandida] = React.useState('B-002');
  const [filtro, setFiltro] = React.useState('todas');
  const [busqueda, setBusqueda] = React.useState('');

  const kpis = CHECKPOINTS.map(cp => ({...cp, n: VIVIENDAS.filter(v => v.f[cp.key]).length, total: VIVIENDAS.length}));
  const maxMO = Math.max(...MO_MENSUAL.map(m => m.v));
  const maxDesp = Math.max(...DESP_MENSUAL.map(m => m.v));

  const datosFiltrados = VIVIENDAS.filter(v => {
    if (filtro === 'pendientes' && v.f.fecha_recep) return false;
    if (filtro === 'recepcionadas' && !v.f.fecha_recep) return false;
    if (busqueda && !v.nom.toLowerCase().includes(busqueda.toLowerCase())) return false;
    return true;
  });

  return (
    <div className="space-y-4">
      {/* KPIs CHECKPOINTS */}
      <div className="bg-white border border-gray-200 rounded-xl shadow-sm p-3">
        <div className="flex items-center justify-between mb-2">
          <h3 className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Checkpoints del Proyecto</h3>
          <span className="text-[10px] text-gray-400">{VIVIENDAS.length} viviendas · datos AppSheet "Seguimiento"</span>
        </div>
        <div className="grid gap-1.5" style={{gridTemplateColumns: `repeat(${CHECKPOINTS.length}, minmax(0, 1fr))`}}>
          {kpis.map(cp => {
            const pct = Math.round((cp.n / cp.total) * 100);
            const color = pct >= 80 ? 'bg-green-50 border-green-200 text-green-700'
                        : pct >= 40 ? 'bg-amber-50 border-amber-200 text-amber-700'
                        : 'bg-gray-50 border-gray-200 text-gray-500';
            return (
              <div key={cp.key} className={`border rounded-lg px-1.5 py-1.5 text-center ${color}`}>
                <div className="text-[9px] font-medium opacity-75 truncate">{cp.label}</div>
                <div className="text-base font-bold leading-tight">{cp.n}</div>
                <div className="text-[9px] opacity-60">/ {cp.total}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* RITMOS MENSUALES */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div className="bg-white border border-gray-200 rounded-xl shadow-sm p-3">
          <div className="flex items-center justify-between mb-2">
            <h3 className="text-xs font-semibold text-gray-700">Ritmo Pagos M.O. (mensual)</h3>
            <span className="text-[10px] text-violet-600 font-medium">Solo Aprobados</span>
          </div>
          <div className="flex items-end gap-1 h-24">
            {MO_MENSUAL.map(m => {
              const h = Math.max(2, Math.round((m.v / maxMO) * 90));
              return (
                <div key={m.ym} className="flex-1 flex flex-col items-center gap-1" title={`${m.ym}: ${formatPeso(m.v)}`}>
                  <div className="text-[9px] text-gray-500 font-mono">{fmtCorto(m.v)}</div>
                  <div className="w-full bg-violet-500 rounded-t" style={{height: h+'px'}}></div>
                  <div className="text-[9px] text-gray-400">{fmtMes(m.ym)}</div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="bg-white border border-gray-200 rounded-xl shadow-sm p-3">
          <div className="flex items-center justify-between mb-2">
            <h3 className="text-xs font-semibold text-gray-700">Ritmo Despachos (mensual)</h3>
            <span className="text-[10px] text-amber-600 font-medium">v1: proxy de actividad</span>
          </div>
          <div className="flex items-end gap-1 h-24">
            {DESP_MENSUAL.map(m => {
              const h = Math.max(2, Math.round((m.v / maxDesp) * 90));
              return (
                <div key={m.ym} className="flex-1 flex flex-col items-center gap-1" title={`${m.ym}: ${m.v} despachos`}>
                  <div className="text-[9px] text-gray-500 font-mono">{m.v}</div>
                  <div className="w-full bg-green-500 rounded-t" style={{height: h+'px'}}></div>
                  <div className="text-[9px] text-gray-400">{fmtMes(m.ym)}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* FILTROS */}
      <div className="flex items-center gap-2 flex-wrap">
        <input type="text" value={busqueda} onChange={e => setBusqueda(e.target.value)}
               placeholder="Buscar por nombre o ID..."
               className="flex-1 min-w-[200px] px-3 py-1.5 text-xs border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-violet-500" />
        {[["todas","Todas"],["pendientes","Pendientes"],["recepcionadas","Recepcionadas"]].map(([k,l]) => (
          <button key={k} onClick={() => setFiltro(k)}
                  className={`px-2.5 py-1.5 text-[11px] rounded-lg border transition-colors ${filtro===k?'bg-violet-600 text-white border-violet-600':'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}>
            {l}
          </button>
        ))}
        <span className="text-[10px] text-gray-400 ml-auto">{datosFiltrados.length} de {VIVIENDAS.length}</span>
      </div>

      {/* TABLA COLAPSABLE */}
      <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
        <div className="hidden md:flex items-center gap-1 px-3 py-2 bg-gray-50 border-b border-gray-200 text-[10px] font-semibold text-gray-500 uppercase tracking-wide">
          <span className="w-6 text-center">#</span>
          <span className="flex-1 min-w-[140px]">Beneficiario</span>
          {CHECKPOINTS.map(cp => <span key={cp.key} className="w-10 text-center" title={cp.label}>{cp.label}</span>)}
          <span className="w-14 text-right">% Av</span>
          <span className="w-10 text-center">💬</span>
        </div>

        <div className="divide-y divide-gray-100">
          {datosFiltrados.map((d, idx) => {
            const exp = expandida === d.id;
            return (
              <div key={d.id}>
                <div onClick={() => setExpandida(exp ? null : d.id)}
                     className={`flex items-center gap-1 px-3 py-2 cursor-pointer hover:bg-gray-50 transition-colors ${exp ? 'bg-violet-50' : ''}`}>
                  <span className="w-6 text-center text-[10px] text-gray-400 font-mono">{idx+1}</span>
                  <div className="flex-1 min-w-[140px]">
                    <div className="text-xs font-semibold text-gray-800 leading-tight">{d.nom}</div>
                    <div className="text-[10px] text-gray-400 font-mono">{d.id} · {d.tip}</div>
                  </div>
                  {CHECKPOINTS.map(cp => (
                    <span key={cp.key} className="w-10 flex justify-center">
                      <span className={`w-3 h-3 rounded-full ${d.f[cp.key] ? 'bg-green-500' : 'bg-gray-200'}`} title={`${cp.label}: ${d.f[cp.key]?'OK':'—'}`}></span>
                    </span>
                  ))}
                  <span className="w-14 text-right">
                    <span className={`text-xs font-bold font-mono ${d.pct >= 90 ? 'text-green-600' : d.pct >= 50 ? 'text-amber-600' : 'text-gray-500'}`}>{d.pct}%</span>
                  </span>
                  <span className="w-10 text-center text-[11px]">
                    {d.com > 0 ? <span className="bg-amber-100 text-amber-700 px-1.5 rounded text-[10px] font-semibold">{d.com}</span> : <span className="text-gray-300">—</span>}
                  </span>
                </div>

                {exp && (
                  <div className="bg-violet-50/30 border-t border-violet-100 px-4 py-3 space-y-3">
                    <div>
                      <h4 className="text-[10px] font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Hitos de Cierre (AppSheet)</h4>
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-1.5 text-[11px]">
                        {[
                          ['visita_as','V.AS'],['resol_as','R.AS'],['visita_f1','V.F1'],['fecha_f1','F1'],
                          ['t1','T1'],['artefactado','Artef.'],['empalme','Empalme'],['visita_dom','V.DOM'],
                          ['fecha_v_dom','F.V.DOM'],['recepcion_dom','Recep.DOM']
                        ].map(([k, lbl]) => {
                          const on = d.f[k];
                          return (
                            <div key={k} className={`flex items-center gap-1.5 px-2 py-1 rounded border ${on ? 'bg-white border-green-200' : 'bg-gray-50 border-gray-200 opacity-60'}`}>
                              <span className={`w-2 h-2 rounded-full ${on?'bg-green-500':'bg-gray-300'}`}></span>
                              <span className="font-medium text-gray-600 w-16 truncate">{lbl}</span>
                              <span className="text-gray-700 truncate flex-1">{d.seg[k] || '—'}</span>
                            </div>
                          );
                        })}
                        <div className={`flex items-center gap-1.5 px-2 py-1 rounded border ${d.f.fecha_recep ? 'bg-white border-green-200' : 'bg-gray-50 border-gray-200 opacity-60'}`}>
                          <span className={`w-2 h-2 rounded-full ${d.f.fecha_recep?'bg-green-500':'bg-gray-300'}`}></span>
                          <span className="font-medium text-gray-600 w-16 truncate">Recep.Def</span>
                          <span className="text-gray-700 truncate flex-1">{d.seg.fecha_recep || '—'}</span>
                        </div>
                      </div>
                    </div>

                    <div>
                      <h4 className="text-[10px] font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Comentarios</h4>
                      <div className="space-y-1">
                        {d.seg.obs && (
                          <div className="text-[11px] text-gray-700 bg-amber-50 border border-amber-200 rounded px-2 py-1">
                            <span className="font-semibold text-amber-700 text-[9px] uppercase mr-1.5">Seguimiento AS</span>
                            {d.seg.obs}
                          </div>
                        )}
                        {d.obsBenef.map((o, oi) => (
                          <div key={oi} className="text-[11px] text-gray-700 bg-white border border-gray-200 rounded px-2 py-1">
                            <span className="font-semibold text-violet-600 text-[9px] uppercase mr-1.5">{o.fecha}</span>
                            {o.texto}
                          </div>
                        ))}
                        {!d.seg.obs && d.obsBenef.length === 0 && (
                          <p className="text-[11px] text-gray-400 italic">Sin comentarios registrados</p>
                        )}
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-white border border-gray-200 rounded px-3 py-2">
                        <div className="text-[10px] text-gray-500 uppercase">M.O. Pagado (acum, Aprob.)</div>
                        <div className="text-sm font-bold text-violet-700 font-mono">{formatPeso(d.mo)}</div>
                        <div className="text-[10px] text-gray-400">{Math.round(d.mo/450000)} pagos aprox.</div>
                      </div>
                      <div className="bg-white border border-gray-200 rounded px-3 py-2">
                        <div className="text-[10px] text-gray-500 uppercase">Estado General</div>
                        <div className="text-sm font-bold text-gray-700">{d.pct >= 90 ? 'En recepción' : d.pct >= 50 ? 'En ejecución' : d.pct > 0 ? 'Inicial' : 'Sin habilitar'}</div>
                        <div className="text-[10px] text-gray-400">Avance: {d.pct}%</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div className="text-[10px] text-gray-400 px-2">
        * Datos de hitos (V.AS, R.AS, V.F1, F1, T1, Artefactado, Empalme, V.DOM, F.V.DOM, Recep.) provienen
        de la tabla "Seguimiento" de AppSheet. En la version real, si una columna aparece vacia, verificar
        el nombre exacto en consola: log "Columnas detectadas en Seguimiento[0]".
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<EstadoGeneralPreview />);
</script>
</body>
</html>
