    function updateLoading(msg, pct, detail) {
        const s = document.getElementById('loadStatus');
        const b = document.getElementById('loadBar');
        const d = document.getElementById('loadDetail');
        if (s) s.textContent = msg;
        if (b) b.style.width = pct + '%';
        if (d) d.textContent = detail || '';
    }

    // Parsear monto chileno "$400.000,00" → 400000
    function parseMonto(val) {
        if (val === null || val === undefined || val === '' || val === 'nan') return 0;
        let s = String(val).trim().replace(/\$/g, '').replace(/\./g, '');
        s = s.replace(',', '.');
        const n = parseFloat(s);
        return isNaN(n) ? 0 : Math.round(n);
    }

    // Parsear fecha: soporta M/D/YYYY, D/M/YYYY, DD-MM-YYYY, ISO
    function parseDate(val) {
        if (!val || val === 'nan' || val === 'NaT' || val === '') return null;
        const s = String(val).trim();
        // Si ya es ISO (YYYY-MM-DD o con T)
        if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0, 10);
        // Formato con slashes: M/D/YYYY o D/M/YYYY
        const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
        if (m) {
            let p1 = parseInt(m[1]), p2 = parseInt(m[2]), year = m[3];
            // Si p1 > 12, es dia (DD/MM/YYYY)
            if (p1 > 12) return `${year}-${String(p2).padStart(2,'0')}-${String(p1).padStart(2,'0')}`;
            // Si p2 > 12, p1 es mes (MM/DD/YYYY)
            if (p2 > 12) return `${year}-${String(p1).padStart(2,'0')}-${String(p2).padStart(2,'0')}`;
            // Ambiguo (ambos <=12): asumir M/D/YYYY (default Google Sheets)
            return `${year}-${String(p1).padStart(2,'0')}-${String(p2).padStart(2,'0')}`;
        }
        // Formato DD-MM-YYYY con guiones
        const m2 = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})/);
        if (m2) {
            return `${m2[3]}-${String(m2[2]).padStart(2,'0')}-${String(m2[1]).padStart(2,'0')}`;
        }
        // ISO datetime from Apps Script
        if (s.includes('T')) return s.substring(0, 10);
        return null;
    }

    async function fetchAllData() {
        updateLoading('Descargando datos...', 10, 'Conectando a Google Sheets');

        const url = APPS_SCRIPT_URL + '?tables=' + encodeURIComponent(TABLES_TO_FETCH);
        let response;
        try {
            response = await fetch(url);
        } catch (e) {
            throw new Error('No se pudo conectar al servidor de datos. Verifica tu conexion a internet.');
        }

        if (!response.ok) {
            throw new Error(`Error del servidor: ${response.status}`);
        }

        updateLoading('Procesando respuesta...', 30, 'Datos recibidos, procesando...');
        const data = await response.json();

        if (data.error) {
            throw new Error('Error en Apps Script: ' + data.error);
        }

        return data;
    }

    function processRawData(raw) {
        updateLoading('Procesando proyectos...', 40);

        // 1. PROYECTOS - filtrar activos (en ejecucion)
        const proyectosRaw = raw.Proyectos?.rows || [];
        PROYECTOS_DATA = proyectosRaw
            .filter(p => (p.estado_general || '').toLowerCase().includes('ejecuci'))
            .map(p => {
                const fi = parseDate(p.fecha_inicio);
                let dur = parseInt(p.duracion) || 0;
                return {
                ID_proy: String(p.ID_proy || ''),
                NOMBRE_PROYECTO: String(p.NOMBRE_PROYECTO || ''),
                COMUNA: String(p.COMUNA || ''),
                fecha_inicio: fi || '',
                duracion: dur
            };
            });

        const idsProyActivos = new Set(PROYECTOS_DATA.map(p => p.ID_proy));

        updateLoading('Procesando beneficiarios...', 45);

        // 2. BENEFICIARIOS - filtrar por proyecto activo + estado valido
        const benRaw = raw.Beneficiario?.rows || [];
        const estadosValidos = ['ejecuci', 'subsidiad', 'preparaci'];
        BENEFICIARIOS_DATA = benRaw
            .filter(b => {
                const proy = String(b.ID_Proy || '');
                const estado = (b.Estado || '').toLowerCase();
                return idsProyActivos.has(proy) && estadosValidos.some(e => estado.includes(e));
            })
            .map(b => {
                const tipViv = String(b['Tipologia Vivienda'] || '');
                const tipRC = String(b['Tipologia RC'] || '');
                const tipVivId = (tipViv && tipViv.toLowerCase() !== 'nan' && tipViv !== '') ? tipViv : '';
                const tipRCId = (tipRC && tipRC.toLowerCase() !== 'nan' && tipRC !== '') ? tipRC : '';
                return {
                    ID_Benef: String(b.ID_Benef || b.IDU_Benef || ''),
                    ID_Proy: String(b.ID_Proy || ''),
                    NOMBRES: String(b.NOMBRES || ''),
                    APELLIDOS: String(b.APELLIDOS || ''),
                    tipologia: tipRCId ? 'Casa + RC' : 'Casa',
                    tipologia_viv_id: tipVivId,
                    tipologia_rc_id: tipRCId
                };
            });

        const idsBenef = new Set(BENEFICIARIOS_DATA.map(b => String(b.ID_Benef)));

        updateLoading('Procesando despachos...', 50);

        // 3. DESPACHOS
        const despRaw = raw.Despacho?.rows || [];
        DESPACHOS_DATA = despRaw
            .filter(d => idsBenef.has(String(d.ID_Benef || '')))
            .map(d => {
                const fecha = parseDate(d.Fecha);
                return fecha ? {
                    ID_Benef: String(d.ID_Benef || ''),
                    Tipo_despacho: String(d.Tipo_despacho || ''),
                    Fecha: fecha,
                    Guia: String(d.Guia || '')
                } : null;
            }).filter(Boolean);

        updateLoading('Procesando solicitudes...', 55);

        // 4. SOLICITUDES
        const solRaw = raw.soldepacho?.rows || [];
        SOLICITUDES_DATA = solRaw
            .filter(s => idsBenef.has(String(s.ID_Benef || '')))
            .map(s => {
                const fecha = parseDate(s.Fecha);
                const fechaCreacion = parseDate(s.fecha_creacion);
                return {
                    ID_Benef: String(s.ID_Benef || ''),
                    Tipo_despacho: String(s.Tipo_despacho || ''),
                    Fecha: fecha || '',
                    fecha_creacion: fechaCreacion || ''
                };
            });

        updateLoading('Procesando inspecciones...', 60);

        // 5. INSPECCIONES (de Ejecucion - sumar deltas)
        // Los valores vienen como fracciones 0-1 (si porcentaje en sheet) o como numeros
        function parseInspVal(val) {
            if (val === null || val === undefined || val === '' || val === 'nan') return 0;
            if (typeof val === 'number') {
                // Google Sheets porcentaje: 0.5 = 50%. Numeros > 1.5 podrían ser porcentajes directos
                return val <= 1.5 ? val : val / 100;
            }
            // String: quitar % y comas
            let s = String(val).trim().replace('%', '').replace(',', '.');
            let n = parseFloat(s);
            if (isNaN(n)) return 0;
            // Si > 1.5, asumir que es porcentaje directo (ej: 50 = 50%)
            return n > 1.5 ? n / 100 : n;
        }

        const ejRaw = raw.Ejecucion?.rows || [];
        const inspMap = {};

        // Detectar variante de columna Art_Baño vs Art_Bano
        const hasBarno = ejRaw.length > 0 && 'A_Art_Bano' in ejRaw[0] && !('A_Art_Baño' in ejRaw[0]);

        // Descubrir columnas RC (AB_*) y Habilitacion
        const sampleRow = ejRaw.length > 0 ? ejRaw[0] : {};
        const rcCols = Object.keys(sampleRow).filter(k => k.startsWith('AB_'));
        const hasHab = 'A_Habilitacion' in sampleRow;

        ejRaw.forEach(e => {
            const idB = String(e.ID_Benef || e.ID_benef || '');
            if (!idsBenef.has(idB)) return;
            if (!inspMap[idB]) inspMap[idB] = {
                ID_Benef: idB, partidas: {}, rc_vals: {},
                hab_sum: 0, n_insp: 0, ultima_insp: '', cierre: {}
            };
            inspMap[idB].n_insp++;

            // Partidas vivienda (28 columnas → short codes)
            Object.entries(VIV_COLUMNS).forEach(([col, info]) => {
                // Manejar variante Baño/Bano
                let actualCol = col;
                if (col === 'A_Art_Baño' && hasBarno) actualCol = 'A_Art_Bano';
                const val = parseInspVal(e[actualCol]);
                if (val > 0) {
                    inspMap[idB].partidas[info.short] = Math.min(1, (inspMap[idB].partidas[info.short] || 0) + val);
                }
            });

            // RC (AB_* columns - promedio simple)
            rcCols.forEach(col => {
                const val = parseInspVal(e[col]);
                if (val > 0) {
                    inspMap[idB].rc_vals[col] = Math.min(1, (inspMap[idB].rc_vals[col] || 0) + val);
                }
            });

            // Habilitacion
            if (hasHab) {
                const val = parseInspVal(e['A_Habilitacion']);
                if (val > 0) {
                    inspMap[idB].hab_sum = Math.min(1, inspMap[idB].hab_sum + val);
                }
            }

            // Fecha de inspeccion (tomar la mas reciente)
            const fInsp = parseDate(e.Fecha_creacion || e.fecha_creacion || '');
            if (fInsp && fInsp > inspMap[idB].ultima_insp) {
                inspMap[idB].ultima_insp = fInsp;
            }

            // Cierre (tomar ultimo valor no vacio - overwrites, last wins)
            Object.entries(CIERRE_COLS).forEach(([col, label]) => {
                const val = String(e[col] || '').trim().toLowerCase();
                if (val && val !== 'nan') {
                    inspMap[idB].cierre[label] = val === 'terminado' ? 1 : 0;
                }
            });
        });

        // Calcular % ponderados
        INSPECCIONES_DATA = Object.values(inspMap).map(insp => {
            // % Vivienda (ponderado por pesos)
            let pct_viv = 0;
            Object.entries(VIV_COLUMNS).forEach(([col, info]) => {
                pct_viv += Math.min(1, Math.max(0, insp.partidas[info.short] || 0)) * info.weight;
            });

        };

        const calcularEstadoEtapas = (idBenef) => {
            // 1. Mapear DESPACHOS realizados
            const despachos = DESPACHOS_DATA.filter(d => String(d.ID_Benef) === String(idBenef));
            const etapasCompletadas = {};
            despachos.forEach(d => {
                const keys = mapearTipoDespacho(d.Tipo_despacho);
                keys.forEach(key => {
                    if (!etapasCompletadas[key] || new Date(d.Fecha) > new Date(etapasCompletadas[key].fecha)) {
                        etapasCompletadas[key] = { fecha: d.Fecha, guia: d.Guia, dias: calcularDias(d.Fecha) };
                    }
                });
            });

            // 2. Mapear SOLICITUDES de despacho
            const solicitudes = SOLICITUDES_DATA.filter(s => String(s.ID_Benef) === String(idBenef));
            const etapasSolicitadas = {};
            solicitudes.forEach(s => {
                const keys = mapearTipoDespacho(s.Tipo_despacho);
                keys.forEach(key => {
                    const fechaSol = s.Fecha || s.fecha_creacion || '';
                    if (fechaSol && !etapasSolicitadas[key] || (fechaSol && new Date(fechaSol) > new Date(etapasSolicitadas[key]?.fecha || '1900-01-01'))) {
                        etapasSolicitadas[key] = { fecha: fechaSol, dias: calcularDias(fechaSol) };
                    }
                });
            });

            // 3. Calcular estado de cada etapa
            const resultado = {};
            Object.entries(ETAPAS_CONFIG).forEach(([etapaKey, config]) => {
                const info = { key: etapaKey, nombre: config.nombre, codigo: config.codigo, estado: "bloqueado", fechaDespacho: null, fechaSolicitud: null, guia: null, diasTranscurridos: null, diasRestantes: null, diasSolicitud: null };

                if (etapasCompletadas[etapaKey]) {
                    // DESPACHADO: material ya entregado
                    info.estado = "despachado";
                    info.fechaDespacho = etapasCompletadas[etapaKey].fecha;
                    info.guia = etapasCompletadas[etapaKey].guia;
                    info.diasTranscurridos = etapasCompletadas[etapaKey].dias;
                    // Agregar info de solicitud si existe (para tooltip)
                    if (etapasSolicitadas[etapaKey]) {
                        info.fechaSolicitud = etapasSolicitadas[etapaKey].fecha;
                    }
                } else if (etapasSolicitadas[etapaKey]) {
                    // SOLICITADO: solicitud hecha, esperando despacho
                    info.estado = "solicitado";
                    info.fechaSolicitud = etapasSolicitadas[etapaKey].fecha;
                    info.diasSolicitud = etapasSolicitadas[etapaKey].dias;
                    info.diasTranscurridos = etapasSolicitadas[etapaKey].dias;
                } else {
                    // Sin despacho ni solicitud: evaluar por dependencias
                    const dep = config.dependencia;
                    let puedeIniciar = config.es_inicio || false;
                    let fechaRef = null;

                    if (dep && etapasCompletadas[dep]) {
                        puedeIniciar = true;
                        fechaRef = etapasCompletadas[dep].fecha;
                    }

                    if (puedeIniciar && fechaRef) {
                        const diasBrutos = calcularDias(fechaRef);
                        const duracionPrevia = config.desde_inicio_dependencia ? 0 : (ETAPAS_CONFIG[dep]?.duracion || 0);
                        const diasEfectivos = Math.max(0, diasBrutos - duracionPrevia);
                        info.diasTranscurridos = diasEfectivos;

                        if (config.tiempo_optimo !== null && config.tiempo_alerta !== null) {
                            info.diasRestantes = config.tiempo_alerta - diasEfectivos;
                            if (diasEfectivos < config.tiempo_optimo) info.estado = "en_tiempo";
                            else if (diasEfectivos < config.tiempo_alerta) info.estado = "atencion";
                            else info.estado = "critico";
                        } else {
                            info.estado = "en_tiempo";
                        }
                    } else if (config.es_inicio) {
                        info.estado = "en_tiempo";
                    }
                }
                resultado[etapaKey] = info;
            });
            return resultado;
        };

        const getUltimaEtapa = (estados) => {
            let ultima = null, maxFecha = null;
            Object.values(estados).forEach(info => {
                if (info.estado === "despachado" && info.fechaDespacho) {
                    const f = new Date(info.fechaDespacho);
                    if (!maxFecha || f > maxFecha) { maxFecha = f; ultima = info; }
                }
            });
            return ultima;
        };

        const getProximaCritica = (estados) => {
            for (const k of SECUENCIA_PRINCIPAL) {
                if (estados[k] && estados[k].estado !== "despachado") return estados[k];
            }
            return null;
        };

        const calcularAvance = (estados) => {
            const comp = SECUENCIA_PRINCIPAL.filter(k => estados[k]?.estado === "despachado").length;
            return { completadas: comp, total: SECUENCIA_PRINCIPAL.length, porcentaje: Math.round((comp / SECUENCIA_PRINCIPAL.length) * 100) };
        };

        const getEstadoGeneral = (estados) => {
            let critico = false, atencion = false;
            Object.values(estados).forEach(i => {
                if (i.estado === "critico") critico = true;
                if (i.estado === "atencion") atencion = true;
            });
            return critico ? "critico" : atencion ? "atencion" : "en_tiempo";
        };

        // ===== COMPONENTES =====
        const EstadoBadge = ({ estado }) => {
            const estilos = {
                despachado: "bg-blue-100 text-blue-700 border-blue-200",
                solicitado: "bg-purple-100 text-purple-700 border-purple-200",
                en_tiempo: "bg-green-100 text-green-700 border-green-200",
                atencion: "bg-yellow-100 text-yellow-700 border-yellow-200",
                critico: "bg-red-100 text-red-700 border-red-200",
                bloqueado: "bg-gray-100 text-gray-500 border-gray-200"
            };
            const labels = { despachado: "Despachado", solicitado: "Solicitado", en_tiempo: "En tiempo", atencion: "Atención", critico: "Crítico", bloqueado: "Bloqueado" };
            return <span className={`inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-medium ${estilos[estado]}`}>{labels[estado]}</span>;
        };

        const EtapaChip = ({ info }) => {
            const colores = { despachado: "bg-blue-500", solicitado: "bg-purple-500", en_tiempo: "bg-green-500", atencion: "bg-yellow-500", critico: "bg-red-500 animate-pulse", bloqueado: "bg-gray-300" };
            return <div className={`w-8 h-8 rounded-full ${colores[info.estado]} flex items-center justify-center text-white text-xs font-bold shadow`}>{info.codigo}</div>;
        };

        // Componente de Línea de Tiempo
        const LineaTiempo = ({ estadoEtapas }) => {
            // Obtener fecha de Fundaciones como Día 1
            const fundaciones = estadoEtapas["01_FUNDACIONES"];
            const fechaInicio = fundaciones?.fechaDespacho ? new Date(fundaciones.fechaDespacho) : null;

            const calcularDiaRelativo = (fechaDespacho) => {
                if (!fechaInicio || !fechaDespacho) return null;
                const fecha = new Date(fechaDespacho);
                const diff = Math.floor((fecha - fechaInicio) / (1000 * 60 * 60 * 24));
                return diff + 1; // Día 1 es el despacho de fundaciones
            };

            const colores = {
                despachado: "bg-blue-500 text-white",
                solicitado: "bg-purple-500 text-white",
                en_tiempo: "bg-green-100 text-green-700 border border-green-300",
                atencion: "bg-yellow-100 text-yellow-700 border border-yellow-300",
                critico: "bg-red-100 text-red-700 border border-red-300 animate-pulse",
                bloqueado: "bg-gray-100 text-gray-400 border border-gray-200"
            };

            return (
                <div className="mt-4 overflow-x-auto">
                    <div className="flex items-stretch gap-1 min-w-max">
                        {SECUENCIA_PRINCIPAL.map((etapaKey, idx) => {
                            const info = estadoEtapas[etapaKey];
                            const diaRelativo = info?.estado === "despachado" ? calcularDiaRelativo(info.fechaDespacho) : null;
                            const esperaDias = info?.diasTranscurridos;

                            return (
                                <React.Fragment key={etapaKey}>
                                    <div className={`flex flex-col items-center rounded-lg px-2 py-1.5 ${colores[info?.estado || "bloqueado"]}`} style={{ minWidth: "70px" }}>
                                        <span className="text-xs font-bold">
                                            {info?.estado === "despachado" ? (
                                                `Día ${diaRelativo}`
                                            ) : info?.estado === "solicitado" ? (
                                                `S${esperaDias || 0}d`
                                            ) : info?.estado === "bloqueado" ? (
                                                "—"
                                            ) : (
                                                `+${esperaDias || 0}d`
                                            )}
                                        </span>
                                        <span className="text-[10px] leading-tight text-center mt-0.5">{info?.nombre}</span>
                                        {info?.estado === "despachado" && info?.guia && (
                                            <span className="text-[9px] opacity-75">#{info.guia}</span>
                                        )}
                                        {info?.estado === "solicitado" && (
                                            <span className="text-[9px] opacity-75">Solicitado</span>
                                        )}
                                    </div>
                                    {idx < SECUENCIA_PRINCIPAL.length - 1 && (
                                        <div className="flex items-center">
                                            <div className={`w-4 h-0.5 ${info?.estado === "despachado" ? "bg-blue-400" : info?.estado === "solicitado" ? "bg-purple-400" : "bg-gray-200"}`} />
                                            <span className="text-gray-300 text-xs">→</span>
                                            <div className={`w-4 h-0.5 ${estadoEtapas[SECUENCIA_PRINCIPAL[idx + 1]]?.estado === "despachado" ? "bg-blue-400" : estadoEtapas[SECUENCIA_PRINCIPAL[idx + 1]]?.estado === "solicitado" ? "bg-purple-400" : "bg-gray-200"}`} />
                                        </div>
                                    )}
                                </React.Fragment>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const BarraProgreso = ({ porcentaje }) => {
            let color = "bg-green-500";
            if (porcentaje < 30) color = "bg-red-400";
            else if (porcentaje < 60) color = "bg-yellow-400";
            else if (porcentaje < 90) color = "bg-blue-400";
            return <div className="w-full bg-gray-200 rounded-full h-2 overflow-hidden"><div className={`h-2 ${color} rounded-full transition-all`} style={{ width: `${porcentaje}%` }} /></div>;
        };

        const KPICard = ({ titulo, valor, icono, color, subtitulo }) => {
            const colores = {
                green: "border-green-200 text-green-600",
                yellow: "border-yellow-200 text-yellow-600",
                red: "border-red-200 text-red-600",
                blue: "border-blue-200 text-blue-600"
            };
            const bgColores = {
                green: "bg-green-50",
                yellow: "bg-yellow-50",
                red: "bg-red-50",
                blue: "bg-blue-50"
            };
            return (
                <div className={`bg-white border ${colores[color]} rounded-xl p-4 shadow-sm`}>
                    <div className="flex items-center justify-between">
                        <div>
                            <p className="text-gray-500 text-sm">{titulo}</p>
                            <p className="text-2xl font-bold text-gray-800 mt-1">{valor}</p>
                            {subtitulo && <p className="text-xs text-gray-400 mt-1">{subtitulo}</p>}
                        </div>
                        <div className={`p-3 rounded-lg ${bgColores[color]}`}>{icono}</div>
                    </div>
                </div>
            );
        };

        const ViviendaCard = ({ beneficiario, estadoEtapas, expanded, onToggle }) => {
            const avance = calcularAvance(estadoEtapas);
            const estadoGeneral = getEstadoGeneral(estadoEtapas);
            const ultimaEtapa = getUltimaEtapa(estadoEtapas);
            const proximaEtapa = getProximaCritica(estadoEtapas);
            const insp = getInspeccion(beneficiario.ID_Benef);
            const inspColor = insp ? (insp.pct_total >= 90 ? "text-green-600" : insp.pct_total >= 50 ? "text-blue-600" : "text-orange-500") : "text-gray-300";
            const hayDiscrepancia = insp && avance.porcentaje > 30 && (avance.porcentaje - insp.pct_total) > 20;

            // v2: Datos de pago y coherencia
            const pagoPct = calcPagoPct(beneficiario.ID_Benef, estadoEtapas);
            const totalPagado = getTotalPagado(beneficiario.ID_Benef);
            const coherenciaAlerts = calcCoherencia(beneficiario.ID_Benef, estadoEtapas);
            const alertasRojas = coherenciaAlerts.filter(a => a.tipo === "rojo");
            const alertasNaranjas = coherenciaAlerts.filter(a => a.tipo === "naranja");
            const pagosPorFam = getPagosPorFamilia(beneficiario.ID_Benef);

            const borderColor = {
                critico: "border-l-4 border-l-red-500 border-red-100",
                atencion: "border-l-4 border-l-yellow-500 border-yellow-100",
                en_tiempo: "border border-gray-200"
            };
            // Si hay alertas rojas de coherencia, forzar borde rojo
            const borderFinal = alertasRojas.length > 0 ? "border-l-4 border-l-red-600 border-red-200" : borderColor[estadoGeneral];

            return (
                <div className={`bg-white ${borderFinal} rounded-lg overflow-hidden shadow-sm hover:shadow-md transition-shadow`}>
                    <div className="p-4 cursor-pointer hover:bg-gray-50 transition-colors" onClick={onToggle}>
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <span className="text-gray-400">{expanded ? <IconChevronDown /> : <IconChevronRight />}</span>
                                <div className="flex items-center gap-2">
                                    <span className={beneficiario.tipologia.includes("RC") ? "text-blue-600" : "text-gray-500"}>{beneficiario.tipologia.includes("RC") ? <IconBuilding /> : <IconHome />}</span>
                                    <div>
                                        <h3 className="font-semibold text-gray-800">{beneficiario.NOMBRES} {beneficiario.APELLIDOS}</h3>
                                        <p className="text-xs text-gray-500">{beneficiario.tipologia}</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                {/* Triple barra: Despacho / Inspeccion / Pago */}
                                <div className="text-right">
                                    <div className="flex items-center gap-2 mb-0.5">
                                        <span className="text-[10px] text-gray-400 w-8 font-mono">Desp</span>
                                        <span className="text-xs text-gray-500">{avance.completadas}/{avance.total}</span>
                                        <span className="text-sm font-bold text-gray-700">{avance.porcentaje}%</span>
                                    </div>
                                    <div className="flex items-center gap-2 mb-0.5">
                                        <span className="text-[10px] text-gray-400 w-8 font-mono">Insp</span>
                                        <span className={`text-sm font-bold ${inspColor}`}>
                                            {insp ? `${insp.pct_total}%` : "—"}
                                        </span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-[10px] text-gray-400 w-8 font-mono">Pago</span>
                                        <span className={`text-sm font-bold ${totalPagado > 0 ? "text-violet-600" : "text-gray-300"}`}>
                                            {totalPagado > 0 ? formatPeso(totalPagado) : "—"}
                                        </span>
                                    </div>
                                    {/* Triple barra visual */}
                                    <div className="w-32 space-y-0.5 mt-1">
                                        <div className="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden">
                                            <div className="triple-bar bg-blue-500" style={{ width: `${avance.porcentaje}%` }} />
                                        </div>
                                        <div className="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden">
                                            <div className="triple-bar bg-emerald-500" style={{ width: `${insp?.pct_total || 0}%` }} />
                                        </div>
                                        <div className="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden">
                                            <div className="triple-bar bg-violet-500" style={{ width: `${pagoPct}%` }} />
                                        </div>
                                    </div>
                                </div>
                                {/* Badge con indicador de coherencia */}
                                <div className="flex flex-col items-center gap-1">
                                    <EstadoBadge estado={estadoGeneral} />
                                    {alertasRojas.length > 0 && (
                                        <span className="inline-flex items-center gap-1 text-[10px] font-bold text-red-600 bg-red-50 border border-red-200 rounded-full px-1.5 py-0.5 coherence-pulse" title="Alerta de coherencia">
                                            <IconWarning /> {alertasRojas.length}
                                        </span>
                                    )}
                                    {alertasRojas.length === 0 && alertasNaranjas.length > 0 && (
                                        <span className="inline-flex items-center gap-1 text-[10px] font-bold text-orange-600 bg-orange-50 border border-orange-200 rounded-full px-1.5 py-0.5">
                                            {alertasNaranjas.length} sin pago
                                        </span>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Línea de Tiempo */}
                        <LineaTiempo estadoEtapas={estadoEtapas} />

                        <div className="mt-3 flex items-center justify-between text-sm">
                            <div className="text-gray-500">
                                {ultimaEtapa ? (
                                    <span>Última: <span className="text-gray-700 font-medium">{ultimaEtapa.nombre}</span> — Guía #{ultimaEtapa.guia} — <span className={estadoGeneral === "critico" ? "text-red-600 font-medium" : estadoGeneral === "atencion" ? "text-yellow-600" : "text-green-600"}>hace {ultimaEtapa.diasTranscurridos} días</span></span>
                                ) : <span className="text-yellow-600">Sin despachos registrados</span>}
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex items-center gap-1">
                                    <IconEye />
                                    <span className={inspColor}>
                                        {insp ? `Insp: ${insp.pct_total}% (${insp.n_insp} reg)` : "Sin insp."}
                                    </span>
                                </div>
                                {insp && insp.cierre && Object.keys(insp.cierre).length > 0 && (
                                    <div className="flex items-center gap-0.5" title="Verificación de Cierre">
                                        {Object.entries(insp.cierre).map(([label, ok]) => (
                                            <span key={label} className={`inline-flex items-center justify-center w-5 h-5 rounded text-[10px] font-bold ${
                                                ok ? "bg-green-500 text-white" : "bg-red-100 text-red-400 border border-red-200"
                                            }`}>{label}</span>
                                        ))}
                                    </div>
                                )}
                                {/* Familias pagadas inline */}
                                {Object.keys(pagosPorFam).length > 0 && (
                                    <div className="flex items-center gap-0.5">
                                        {FAMILIAS_CRITICAS.map(fam => (
                                            <span key={fam} className={`inline-flex items-center justify-center w-6 h-5 rounded text-[9px] font-bold ${
                                                pagosPorFam[fam] ? "bg-violet-100 text-violet-700 border border-violet-200" : "bg-gray-50 text-gray-300 border border-gray-200"
                                            }`} title={fam}>{FAMILIA_LABELS[fam] ? FAMILIA_LABELS[fam].substring(0,2) : "?"}</span>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Alertas de coherencia */}
                        {alertasRojas.length > 0 && (
                            <div className="mt-3 p-2 bg-red-50 border border-red-300 rounded-lg">
                                {alertasRojas.map((a, i) => (
                                    <div key={i} className="flex items-center gap-2 text-red-700 text-sm">
                                        <span className="coherence-pulse"><IconWarning /></span>
                                        <span><strong>{a.etapa}:</strong> {a.msg}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                        {alertasRojas.length === 0 && alertasNaranjas.length > 0 && (
                            <div className="mt-2 p-2 bg-orange-50 border border-orange-200 rounded-lg">
                                {alertasNaranjas.slice(0, 2).map((a, i) => (
                                    <div key={i} className="flex items-center gap-2 text-orange-600 text-sm">
                                        <IconAlert />
                                        <span><strong>{a.etapa}:</strong> {a.msg}</span>
                                    </div>
                                ))}
                                {alertasNaranjas.length > 2 && <p className="text-xs text-orange-400 ml-6">+{alertasNaranjas.length - 2} más</p>}
                            </div>
                        )}
                        {estadoGeneral === "critico" && proximaEtapa && alertasRojas.length === 0 && (
                            <div className="mt-3 p-2 bg-red-50 border border-red-200 rounded-lg">
                                <div className="flex items-center gap-2 text-red-600 text-sm">
                                    <span className="animate-pulse"><IconAlert /></span>
                                    <span><strong>{proximaEtapa.nombre}</strong> atrasado {proximaEtapa.diasTranscurridos - 14} días</span>
                                </div>
                            </div>
                        )}
                        {hayDiscrepancia && alertasRojas.length === 0 && (
                            <div className="mt-2 p-2 bg-orange-50 border border-orange-200 rounded-lg">
                                <div className="flex items-center gap-2 text-orange-600 text-sm">
                                    <IconAlert />
                                    <span>Desp: {avance.porcentaje}% vs Insp: {insp?.pct_total}% — Gap de {avance.porcentaje - (insp?.pct_total || 0)}pp</span>
                                </div>
                            </div>
                        )}
                    </div>

                    {expanded && (
                        <div className="border-t border-gray-100 p-4 bg-gray-50">
                            {/* Detalle Etapas */}
                            <h4 className="text-sm font-medium text-gray-700 mb-3">Detalle de Etapas (Despachos)</h4>
                            <div className="space-y-2">
                                {Object.entries(estadoEtapas).map(([key, info]) => (
                                    <div key={key} className="flex items-center gap-3 text-sm">
                                        <EtapaChip info={info} />
                                        <span className="text-gray-700 flex-1">{info.nombre}</span>
                                        <span className="text-gray-500">
                                            {info.estado === "despachado" && `Guía #${info.guia} — ${info.diasTranscurridos}d`}
                                            {info.estado === "solicitado" && <span className="text-purple-600">Solicitado hace {info.diasSolicitud}d — esperando despacho</span>}
                                            {info.estado === "critico" && <span className="text-red-600">{info.diasTranscurridos}d</span>}
                                            {info.estado === "atencion" && <span className="text-yellow-600">{info.diasTranscurridos}d</span>}
                                            {info.estado === "en_tiempo" && info.diasTranscurridos && <span className="text-green-600">{info.diasTranscurridos}d</span>}
                                            {info.estado === "bloqueado" && "Bloqueado"}
                                        </span>
                                    </div>
                                ))}
                            </div>

                            {/* v2: Detalle de Pagos */}
                            {Object.keys(pagosPorFam).length > 0 && (
                                <div className="mt-4 pt-4 border-t border-gray-200">
                                    <h4 className="text-sm font-medium text-gray-700 mb-2">Pagos por Familia</h4>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className="text-left text-gray-500 border-b border-gray-200 bg-white">
                                                    <th className="py-1.5 px-2 text-xs">Familia</th>
                                                    <th className="py-1.5 px-2 text-xs text-right">Total</th>
                                                    <th className="py-1.5 px-2 text-xs text-center"># Pagos</th>
                                                    <th className="py-1.5 px-2 text-xs">Maestro</th>
                                                    <th className="py-1.5 px-2 text-xs">Último pago</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {Object.entries(pagosPorFam).sort((a, b) => b[1].total - a[1].total).map(([fam, data]) => {
                                                    const ultimoPago = data.pagos.sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''))[0];
                                                    const maestroNombre = getMaestroNombre(ultimoPago?.maestro);
                                                    const esViatico = fam === "Viatico";

                                                        </tr>

                                                    <td className="py-2 px-2 text-center text-gray-600">{getSolpago(beneficiario.ID_Benef).length}</td>
                                                    <td colSpan={2}></td>

                                            </tfoot>
                                        </table>
                                    </div>
                                </div>

                            {/* Grilla de Inspecciones */}
                            {insp ? (
                                <div className="mt-4 pt-4 border-t border-gray-200">
                                    <h4 className="text-sm font-medium text-gray-700 mb-1">
                                        Avance por Inspecciones
                                    </h4>
                                    <div className="flex items-center gap-4 text-xs text-gray-500 mb-2">
                                        <span>Viv (70%): <strong className="text-gray-700">{insp.pct_viv}%</strong></span>
                                        <span>RC (25%): <strong className="text-gray-700">{insp.pct_rc}%</strong></span>
                                        <span>Hab (5%): <strong className="text-gray-700">{insp.pct_hab}%</strong></span>
                                        <span>Total: <strong className={inspColor}>{insp.pct_total}%</strong></span>
                                        <span className="text-gray-400">| {insp.n_insp} registros</span>
                                    </div>
                                    <div className="grid grid-cols-7 sm:grid-cols-14 gap-1">
                                        {Object.entries(insp.partidas).map(([nombre, pct]) => (
                                            <div
                                                key={nombre}
                                                className={`text-center rounded p-1 cursor-default ${
                                                    pct >= 100 ? "bg-green-100 text-green-700 border border-green-200" :
                                                    pct > 0 ? "bg-yellow-50 text-yellow-700 border border-yellow-200" :
                                                    "bg-gray-50 text-gray-400 border border-gray-200"
                                                }`}
                                                title={`${nombre}: ${pct}%`}
                                            >
                                                <div className="font-mono text-[9px] leading-tight">{nombre}</div>
                                                <div className="font-bold text-[10px]">{pct}%</div>
                                            </div>
                                        ))}
                                    </div>
                                    {insp.cierre && Object.keys(insp.cierre).length > 0 && (
                                        <div className="mt-3 pt-3 border-t border-gray-200">
                                            <div className="flex items-center gap-3">
                                                <span className="text-xs font-medium text-gray-600">Verificación de Cierre:</span>
                                                <div className="flex items-center gap-1">
                                                    {Object.entries(insp.cierre).map(([label, ok]) => (
                                                        <span key={label} className={`inline-flex items-center justify-center w-7 h-7 rounded text-xs font-bold ${
                                                            ok ? "bg-green-500 text-white" : "bg-red-100 text-red-400 border border-red-200"
                                                        }`}>{label}</span>
                                                    ))}
                                                </div>
                                                <span className="text-[10px] text-gray-400">
                                                    ({Object.values(insp.cierre).filter(v => v).length}/{Object.keys(insp.cierre).length} completadas)
                                                </span>
                                            </div>
                                        </div>
                                    )}
                                    {insp.ultima_insp && (
                                        <p className="text-[11px] text-gray-400 mt-2">Última inspección: {insp.ultima_insp}</p>
                                    )}
                                </div>
                            ) : (
                                <div className="mt-4 pt-4 border-t border-gray-200">
                                    <p className="text-xs text-gray-400">Sin registros de inspección</p>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // ===== COMPONENTE CONFIGURACIÓN DE ETAPAS =====
        const ConfiguracionEtapas = () => null; // Moved to ConfiguracionView

        // ===== CONFIGURACION VIEW (Diagrama + Editor de Etapas) =====
        const ConfiguracionView = () => {
            const originalConfig = ETAPAS_CONFIG_FULL;
            const [config, setConfig] = React.useState(() => JSON.parse(JSON.stringify(originalConfig)));
            const [subTab, setSubTab] = React.useState('diagrama');
            const [dirty, setDirty] = React.useState(false);

            const etapas = config.etapas || {};
            const secuencia = config.secuencia_principal || [];
            const allKeys = Object.keys(etapas);

            // Update helper
            const updateEtapa = (key, field, value) => {
                setConfig(prev => {
                    const next = JSON.parse(JSON.stringify(prev));
                    next.etapas[key][field] = value;
                    return next;
                });
                setDirty(true);
            };

            const toggleSecuencia = (key) => {
                setConfig(prev => {
                    const next = JSON.parse(JSON.stringify(prev));
                    const idx = next.secuencia_principal.indexOf(key);
                    if (idx >= 0) next.secuencia_principal.splice(idx, 1);
                    else next.secuencia_principal.push(key);
                    return next;
                });
                setDirty(true);
            };

            const toggleCritico = (key) => {
                updateEtapa(key, 'critico', !etapas[key].critico);
            };

            const restaurar = () => {
                setConfig(JSON.parse(JSON.stringify(originalConfig)));
                setDirty(false);
            };

            const exportarJSON = () => {
                const exportData = JSON.parse(JSON.stringify(config));
                exportData._ultima_modificacion = new Date().toISOString().split('T')[0];
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'etapas_config.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            // BFS para calcular niveles de dependencia
            const calcNiveles = () => {
                const niveles = {};
                const visited = new Set();
                const queue = [];

                // Etapas sin dependencia = nivel 0
                allKeys.forEach(k => {
                    if (!etapas[k].dependencia) {
                        niveles[k] = 0;
                        visited.add(k);
                        queue.push(k);
                    }
                });

                while (queue.length > 0) {
                    const current = queue.shift();
                    allKeys.forEach(k => {
                        if (!visited.has(k) && etapas[k].dependencia === current) {
                            niveles[k] = (niveles[current] || 0) + 1;
                            visited.add(k);
                            queue.push(k);
                        }
                    });
                }

                // Agrupar por nivel
                const porNivel = {};
                Object.entries(niveles).forEach(([k, n]) => {
                    if (!porNivel[n]) porNivel[n] = [];
                    porNivel[n].push(k);
                });
                return porNivel;
            };

            const niveles = calcNiveles();
            const maxNivel = Math.max(...Object.keys(niveles).map(Number), 0);

            // ===== SUB-TAB: DIAGRAMA =====
            const DiagramaTab = () => {
                // Calcular posiciones de nodos para SVG
                const NODE_W = 150;
                const NODE_H = 80;
                const LEVEL_GAP = 60;
                const NODE_GAP = 16;

                // Calcular alto por nivel
                const maxNodesInLevel = Math.max(...Object.values(niveles).map(arr => arr.length), 1);
                const svgHeight = Math.max(maxNodesInLevel * (NODE_H + NODE_GAP) + 40, 300);
                const svgWidth = (maxNivel + 1) * (NODE_W + LEVEL_GAP) + 60;

                // Posiciones de cada nodo
                const positions = {};
                Object.entries(niveles).forEach(([nivel, keys]) => {
                    const n = Number(nivel);
                    const totalH = keys.length * NODE_H + (keys.length - 1) * NODE_GAP;
                    const startY = (svgHeight - totalH) / 2;
                    keys.forEach((k, i) => {
                        positions[k] = {
                            x: 30 + n * (NODE_W + LEVEL_GAP),
                            y: startY + i * (NODE_H + NODE_GAP)
                        };
                    });
                });

                const esCritica = (k) => secuencia.includes(k);
                const esFlexible = (k) => etapas[k].flexible || etapas[k].ventana_flexible;

                return (
                    <div className="overflow-auto bg-gray-50 border border-gray-200 rounded-lg p-4">
                        <svg width={svgWidth} height={svgHeight} className="block">
                            {/* Conectores */}
                            {allKeys.map(k => {
                                const dep = etapas[k].dependencia;
                                if (!dep || !positions[dep] || !positions[k]) return null;
                                const from = positions[dep];
                                const to = positions[k];
                                const x1 = from.x + NODE_W;
                                const y1 = from.y + NODE_H / 2;
                                const x2 = to.x;
                                const y2 = to.y + NODE_H / 2;
                                const midX = (x1 + x2) / 2;
                                const isCrit = esCritica(k) && esCritica(dep);
                                return (
                                    <g key={`conn-${k}`}>
                                        <path
                                            d={`M${x1},${y1} C${midX},${y1} ${midX},${y2} ${x2},${y2}`}
                                            fill="none"
                                            stroke={isCrit ? "#8b5cf6" : "#d1d5db"}
                                            strokeWidth={isCrit ? 2.5 : 1.5}
                                            strokeDasharray={esFlexible(k) ? "6,3" : "none"}
                                        />
                                        {/* Flecha */}
                                        <polygon
                                            points={`${x2},${y2} ${x2-8},${y2-4} ${x2-8},${y2+4}`}
                                            fill={isCrit ? "#8b5cf6" : "#d1d5db"}
                                        />
                                    </g>
                                );
                            })}

                            {/* Nodos */}
                            {allKeys.map(k => {
                                const pos = positions[k];
                                if (!pos) return null;
                                const e = etapas[k];
                                const crit = esCritica(k);
                                const flex = esFlexible(k);

                                return (
                                    <g key={k} transform={`translate(${pos.x},${pos.y})`}>
                                        <rect
                                            width={NODE_W} height={NODE_H} rx={8} ry={8}
                                            fill={crit ? "#faf5ff" : flex ? "#f9fafb" : "white"}
                                            stroke={crit ? "#8b5cf6" : flex ? "#9ca3af" : "#e5e7eb"}
                                            strokeWidth={crit ? 2.5 : 1.5}
                                            strokeDasharray={flex ? "6,3" : "none"}
                                        />
                                        {/* Nombre */}
                                        <text x={NODE_W/2} y={20} textAnchor="middle" fontSize="11" fontWeight="600" fill={crit ? "#6d28d9" : "#374151"}>
                                            {e.nombre}
                                        </text>
                                        {/* Codigo */}
                                        <text x={NODE_W/2} y={35} textAnchor="middle" fontSize="10" fill="#9ca3af" fontFamily="IBM Plex Mono">
                                            {e.codigo} {crit ? "| CRITICO" : flex ? "| flexible" : ""}
                                        </text>
                                        {/* Duracion */}
                                        <text x={NODE_W/2} y={52} textAnchor="middle" fontSize="10" fill="#6b7280">
                                            Duración: {e.duracion}d
                                        </text>
                                        {/* Tiempos optimo/alerta */}
                                        {e.tiempo_optimo !== null && (
                                            <g>
                                                <rect x={10} y={60} width={(NODE_W-20)*0.5} height={6} rx={3} fill="#22c55e" opacity={0.6} />
                                                <rect x={10 + (NODE_W-20)*0.5} y={60} width={(NODE_W-20)*0.5} height={6} rx={3} fill="#eab308" opacity={0.6} />
                                                <text x={18} y={69} fontSize="8" fill="#166534">{e.tiempo_optimo}d</text>
                                                <text x={NODE_W-30} y={69} fontSize="8" fill="#854d0e">{e.tiempo_alerta}d</text>
                                            </g>
                                        )}
                                    </g>
                                );
                            })}
                        </svg>

                        {/* Leyenda del diagrama */}
                        <div className="mt-4 flex flex-wrap gap-4 text-xs text-gray-500 border-t border-gray-200 pt-3">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-4 rounded border-2 border-violet-500 bg-violet-50" />
                                <span>Ruta crítica</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-4 rounded border-2 border-gray-300 border-dashed bg-gray-50" />
                                <span>Etapa flexible</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-4 rounded border-2 border-gray-200 bg-white" />
                                <span>Etapa estándar</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-0.5 bg-violet-500" />
                                <span>Dependencia crítica</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-0.5 bg-gray-300 border-t border-dashed" />
                                <span>Dependencia flexible</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="flex gap-0.5">
                                    <div className="w-4 h-2 rounded bg-green-500 opacity-60" />
                                    <div className="w-4 h-2 rounded bg-yellow-500 opacity-60" />
                                </div>
                                <span>Tiempos: óptimo | alerta</span>
                            </div>
                        </div>
                    </div>
                );
            };

            // ===== SUB-TAB: EDITOR =====
            const EditorTab = () => {
                return (
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead>
                                <tr className="text-left text-gray-500 border-b border-gray-200 bg-gray-50">
                                    <th className="py-2 px-3">Cód</th>
                                    <th className="py-2 px-3">Etapa</th>
                                    <th className="py-2 px-3 text-center">Duración</th>
                                    <th className="py-2 px-3 text-center">T. Óptimo</th>
                                    <th className="py-2 px-3 text-center">T. Alerta</th>
                                    <th className="py-2 px-3">Depende de</th>
                                    <th className="py-2 px-3 text-center">Crítica</th>
                                    <th className="py-2 px-3 text-center">En Secuencia</th>
                                </tr>
                            </thead>
                            <tbody>
                                {allKeys.map((key) => {
                                    const e = etapas[key];
                                    const enSeq = secuencia.includes(key);
                                    return (
                                        <tr key={key} className={`border-b border-gray-100 ${enSeq ? "bg-violet-50/50" : ""}`}>
                                            <td className="py-2 px-3 font-mono text-gray-600">{e.codigo}</td>
                                            <td className="py-2 px-3 text-gray-800 font-medium">{e.nombre}</td>
                                            <td className="py-2 px-3 text-center">
                                                <input
                                                    type="number" min="1" max="60"
                                                    value={e.duracion || 0}
                                                    onChange={(ev) => updateEtapa(key, 'duracion', parseInt(ev.target.value) || 0)}
                                                    className="w-14 text-center border border-gray-300 rounded px-1 py-0.5 text-sm focus:ring-1 focus:ring-violet-400 focus:border-violet-400"
                                                />
                                            </td>
                                            <td className="py-2 px-3 text-center">
                                                <input
                                                    type="number" min="0" max="60"
                                                    value={e.tiempo_optimo ?? ''}
                                                    placeholder="-"
                                                    onChange={(ev) => {
                                                        const v = ev.target.value === '' ? null : parseInt(ev.target.value);
                                                        updateEtapa(key, 'tiempo_optimo', v);
                                                    }}
                                                    className="w-14 text-center border border-gray-300 rounded px-1 py-0.5 text-sm focus:ring-1 focus:ring-green-400 focus:border-green-400"
                                                />
                                            </td>
                                            <td className="py-2 px-3 text-center">
                                                <input
                                                    type="number" min="0" max="60"
                                                    value={e.tiempo_alerta ?? ''}
                                                    placeholder="-"
                                                    onChange={(ev) => {
                                                        const v = ev.target.value === '' ? null : parseInt(ev.target.value);
                                                        updateEtapa(key, 'tiempo_alerta', v);
                                                    }}
                                                    className="w-14 text-center border border-gray-300 rounded px-1 py-0.5 text-sm focus:ring-1 focus:ring-red-400 focus:border-red-400"
                                                />
                                            </td>
                                            <td className="py-2 px-3">
                                                <select
                                                    value={e.dependencia || ''}
                                                    onChange={(ev) => updateEtapa(key, 'dependencia', ev.target.value || null)}
                                                    className="w-full border border-gray-300 rounded px-1 py-0.5 text-sm text-gray-700 focus:ring-1 focus:ring-violet-400 bg-white"
                                                >
                                                    <option value="">— Ninguna —</option>
                                                    {allKeys.filter(k => k !== key).map(k => (
                                                        <option key={k} value={k}>{etapas[k].nombre} ({etapas[k].codigo})</option>
                                                    ))}
                                                </select>
                                            </td>
                                            <td className="py-2 px-3 text-center">
                                                <input
                                                    type="checkbox"
                                                    checked={!!e.critico}
                                                    onChange={() => toggleCritico(key)}
                                                    className="w-4 h-4 rounded border-gray-300 text-violet-600 focus:ring-violet-400"
                                                />
                                            </td>
                                            <td className="py-2 px-3 text-center">
                                                <input
                                                    type="checkbox"
                                                    checked={enSeq}
                                                    onChange={() => toggleSecuencia(key)}
                                                    className="w-4 h-4 rounded border-gray-300 text-violet-600 focus:ring-violet-400"
                                                />
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                );
            };

            return (
                <div>
                    {/* Header */}
                    <div className="mb-6">
                        <h2 className="text-2xl font-bold text-gray-800">Configuración de Etapas</h2>
                        <p className="text-gray-500 text-sm mt-1">Visualiza dependencias y edita tiempos de la ruta de construcción</p>
                    </div>

                    {/* Sub-tabs */}
                    <div className="flex items-center justify-between mb-4">
                        <div className="flex gap-1 bg-white border border-gray-200 rounded-lg p-1 shadow-sm">
                            {[["diagrama", "Diagrama de Dependencias"], ["editor", "Editor de Tiempos"]].map(([k, l]) => (
                                <button
                                    key={k}
                                    onClick={() => setSubTab(k)}
                                    className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${
                                        subTab === k ? "bg-raices-red text-white" : "text-gray-600 hover:bg-gray-100"
                                    }`}
                                >
                                    {l}
                                </button>
                            ))}
                        </div>

                        {/* Acciones */}
                        <div className="flex items-center gap-2">
                            {dirty && (
                                <span className="text-xs text-orange-500 font-medium mr-2">Cambios sin guardar</span>
                            )}
                            <button
                                onClick={restaurar}
                                className="px-3 py-1.5 text-sm border border-gray-300 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors"
                            >
                                Restaurar Original
                            </button>
                            <button
                                onClick={exportarJSON}
                                className="px-3 py-1.5 text-sm bg-raices-red text-white rounded-lg hover:bg-opacity-90 transition-colors flex items-center gap-1"
                            >
                                <IconDownload /> Exportar JSON
                            </button>
                        </div>
                    </div>

                    {/* Contenido */}
                    {subTab === 'diagrama' ? <DiagramaTab /> : <EditorTab />}

                    {/* Nota */}
                    <div className="mt-4 p-3 bg-yellow-50 border border-yellow-200 rounded-lg text-xs text-yellow-700">
                        <strong>Nota:</strong> Para aplicar cambios al dashboard, exporta el JSON y reemplaza <code className="bg-yellow-100 px-1 rounded">config/etapas_config.json</code>, luego regenera el dashboard.
                    </div>

                    {/* Reglas */}
                    <div className="mt-4 bg-gray-50 border border-gray-200 rounded-lg p-4">
                        <h5 className="text-sm font-medium text-gray-800 mb-2">Reglas de Cálculo</h5>
                        <ul className="text-xs text-gray-600 space-y-1">
                            <li>• <span className="text-green-600 font-medium">Verde (En tiempo)</span>: días_efectivos &lt; tiempo_óptimo</li>
                            <li>• <span className="text-yellow-600 font-medium">Amarillo (Atención)</span>: tiempo_óptimo ≤ días_efectivos &lt; tiempo_alerta</li>
                            <li>• <span className="text-red-600 font-medium">Rojo (Crítico)</span>: días_efectivos ≥ tiempo_alerta</li>
                            <li>• <strong>días_efectivos</strong> = días_desde_despacho_anterior - duración_etapa_anterior</li>
                            <li>• Etapa <span className="text-gray-500 font-medium">Bloqueada</span> si su dependencia no ha sido despachada</li>
                        </ul>
                    </div>
                </div>
            );
        };

        // ===== PRESUPUESTO M.O. - COMPARATIVO REAL VS BASE =====
        const PresupuestoView = ({ viviendas, proyectoSel }) => {
            const [ordenCol, setOrdenCol] = React.useState("nombre");
            const [ordenDir, setOrdenDir] = React.useState("asc");
            const [expandido, setExpandido] = React.useState(null);

            const proy = PROYECTOS_DATA.find(p => String(p.ID_proy) === String(proyectoSel));

            // Familias de M.O. (excluir Viatico, Extra, Jefe de Obras, rampa, etc.)
            const FAMILIAS_MO = [
                "01 - Fundaciones", "02 - 1era Etapa", "03 - 2da Etapa",
                "04 - Gasfiteria", "05 - Cerámica", "06 - Pintura",
                "07 - Eléctricidad", "08 - Obras Exteriores", "11 - Recepcion"
            ];
            const FAMILIAS_LABELS = {
                "01 - Fundaciones": "Fundaciones", "02 - 1era Etapa": "1era Etapa", "03 - 2da Etapa": "2da Etapa",
                "04 - Gasfiteria": "Gasfitería", "05 - Cerámica": "Cerámica", "06 - Pintura": "Pintura",
                "07 - Eléctricidad": "Electricidad", "08 - Obras Exteriores": "OO.EE.", "11 - Recepcion": "Recepción"
            };

            // Familias transversales (se muestran aparte)
            const FAMILIAS_OTROS = ["Viatico", "10 - Viatico", "Extra", "09 - Extra", "12 - Adicional", "Adicional", "Jefe de Obras"];

            const beneficiariosProyecto = BENEFICIARIOS_DATA.filter(b => String(b.ID_Proy) === String(proyectoSel));

            // Construir datos comparativos
            const comparativo = React.useMemo(() => {
                return beneficiariosProyecto.map(ben => {
                    const tipVivId = ben.tipologia_viv_id || '';
                    const tipRcId = ben.tipologia_rc_id || '';

                    // Presupuesto base por familia (vivienda)
                    const baseViv = tipVivId ? (PRESUPUESTO_DATA[tipVivId] || {}) : {};
                    // Presupuesto base RC
                    const baseRc = tipRcId ? (PRESUPUESTO_DATA[tipRcId] || {}) : {};

                    // Pagos reales
                    const pagos = getSolpago(ben.ID_Benef);
                    const realPorFamilia = {};
                    pagos.forEach(p => {
                        const fam = p.Familia_pago;
                        realPorFamilia[fam] = (realPorFamilia[fam] || 0) + p.monto;
                    });

                    // Avance inspeccion por familia
                    const avanceFam = getAvancePorFamilia(ben.ID_Benef);

                    // Comparativo por familia M.O.
                    let totalBase = 0;
                    let totalReal = 0;
                    let alertasCoherencia = 0;
                    const familias = {};

                    FAMILIAS_MO.forEach(fam => {
                        const base = (baseViv[fam] || 0) + (baseRc[fam] || 0);
                        const real = realPorFamilia[fam] || 0;
                        totalBase += base;
                        totalReal += real;
                        const avance = avanceFam[fam] || null;
                        const avPct = avance ? avance.pct : null;

                        // Coherencia pago vs avance
                        let coherencia = "ok"; // ok, pagado_sin_avance, avance_sin_pago, sin_actividad
                        if (real > 0 && avPct !== null && avPct < 30) {
                            coherencia = "pagado_sin_avance"; // ALERTA: se pago pero no hay avance fisico
                            alertasCoherencia++;
                        } else if (real === 0 && avPct !== null && avPct >= 70) {
                            coherencia = "avance_sin_pago"; // Maestro trabajo pero no se le ha pagado
                        } else if (real === 0 && (avPct === null || avPct === 0)) {
                            coherencia = "sin_actividad";
                        }

                        familias[fam] = {
                            base, real,
                            diff: base > 0 ? ((real - base) / base * 100) : (real > 0 ? 100 : 0),
                            avPct, avance, coherencia
                        };
                    });

                    // Avance total inspección
                    const inspData = INSPECCIONES_DATA.find(i => String(i.ID_Benef) === String(ben.ID_Benef));
                    const avanceTotalInsp = inspData ? inspData.pct_total : null;

                    // Otros gastos (viaticos, extras)
                    let totalOtros = 0;
                    let totalBaseOtros = 0;
                    FAMILIAS_OTROS.forEach(fam => {
                        totalOtros += (realPorFamilia[fam] || 0);
                        totalBaseOtros += (baseViv[fam] || 0) + (baseRc[fam] || 0);
                    });

                    const totalRealGlobal = totalReal + totalOtros;
                    const totalBaseGlobal = totalBase + totalBaseOtros;
                    const diffGlobal = totalBaseGlobal > 0 ? ((totalRealGlobal - totalBaseGlobal) / totalBaseGlobal * 100) : 0;

                    return {
                        id: ben.ID_Benef,
                        nombre: `${ben.APELLIDOS} ${ben.NOMBRES.split(' ')[0]}`,
                        tipologia: ben.tipologia,
                        tipVivId, tipRcId,
                        familias,
                        totalBase, totalReal, totalOtros, totalBaseOtros,
                        totalRealGlobal, totalBaseGlobal, diffGlobal,
                        tienePresupuesto: totalBase > 0,
                        realPorFamilia, avanceFam, avanceTotalInsp, alertasCoherencia
                    };
                });
            }, [proyectoSel]);

            // Ordenar
            const comparativoOrdenado = React.useMemo(() => {
                const sorted = [...comparativo];
                sorted.sort((a, b) => {
                    let va, vb;
                    if (ordenCol === "nombre") { va = a.nombre; vb = b.nombre; }
                    else if (ordenCol === "totalBase") { va = a.totalBase; vb = b.totalBase; }
                    else if (ordenCol === "totalReal") { va = a.totalRealGlobal; vb = b.totalRealGlobal; }
                    else if (ordenCol === "diff") { va = a.diffGlobal; vb = b.diffGlobal; }
                    else { va = (a.familias[ordenCol]?.real || 0); vb = (b.familias[ordenCol]?.real || 0); }
                    if (va < vb) return ordenDir === "asc" ? -1 : 1;
                    if (va > vb) return ordenDir === "asc" ? 1 : -1;
                    return 0;
                });
                return sorted;
            }, [comparativo, ordenCol, ordenDir]);

            const toggleOrden = (col) => {
                if (ordenCol === col) setOrdenDir(d => d === "asc" ? "desc" : "asc");
                else { setOrdenCol(col); setOrdenDir("asc"); }
            };

            // KPIs agregados
            const kpis = React.useMemo(() => {
                const conPresupuesto = comparativo.filter(c => c.tienePresupuesto);
                const sobreGasto = conPresupuesto.filter(c => c.diffGlobal > 10);
                const bajoGasto = conPresupuesto.filter(c => c.diffGlobal < -10);
                const enRango = conPresupuesto.filter(c => Math.abs(c.diffGlobal) <= 10);
                const totalBaseGlobal = comparativo.reduce((s, c) => s + c.totalBaseGlobal, 0);
                const totalRealGlobal = comparativo.reduce((s, c) => s + c.totalRealGlobal, 0);
                const conAlertaCoherencia = comparativo.filter(c => c.alertasCoherencia > 0).length;
                const conAvanceSinPago = comparativo.filter(c =>
                    Object.values(c.familias).some(f => f.coherencia === "avance_sin_pago")
                ).length;
                return {
                    conPresupuesto: conPresupuesto.length,
                    sinPresupuesto: comparativo.length - conPresupuesto.length,
                    sobreGasto: sobreGasto.length,
                    bajoGasto: bajoGasto.length,
                    enRango: enRango.length,
                    totalBase: totalBaseGlobal,
                    totalReal: totalRealGlobal,
                    diffPct: totalBaseGlobal > 0 ? ((totalRealGlobal - totalBaseGlobal) / totalBaseGlobal * 100) : 0,
                    conAlertaCoherencia,
                    conAvanceSinPago
                };
            }, [comparativo]);

            const fmtM = (v) => {
                if (v === 0) return "-";
                if (Math.abs(v) >= 1000000) return `${(v/1000000).toFixed(1)}M`;
                return `${Math.round(v/1000)}k`;
            };

            const fmtPct = (v) => {
                if (v === 0) return "";
                const sign = v > 0 ? "+" : "";
                return `${sign}${Math.round(v)}%`;
            };

            const diffColor = (pct) => {
                if (pct > 20) return "text-red-600 font-semibold";
                if (pct > 10) return "text-orange-500";
                if (pct < -10) return "text-blue-500";
                return "text-green-600";
            };

            const diffBg = (pct) => {
                if (pct > 20) return "bg-red-50";
                if (pct > 10) return "bg-orange-50";
                if (pct < -10) return "bg-blue-50";
                return "";
            };

            if (beneficiariosProyecto.length === 0) {
                return (
                    <div className="flex flex-col items-center justify-center h-64 text-gray-400">
                        <IconDollar />
                        <p className="mt-2 text-sm">Selecciona un proyecto para ver el comparativo de presupuesto</p>
                    </div>
                );
            }

            return (
                <div>
                    {/* Header */}
                    <div className="mb-6">
                        <p className="text-gray-500 text-sm mb-1">Proyecto: {proy?.NOMBRE_PROYECTO}</p>
                        <h2 className="text-2xl font-bold text-gray-800">Comparativo Real vs Presupuesto M.O.</h2>
                        <p className="text-gray-400 text-xs mt-1">Base: Tabla de Mano de Obra por tipologia | Real: Pagos Aprobados (Solpago)</p>
                    </div>

                    {/* KPIs */}
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                        <div className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                            <p className="text-gray-500 text-xs">Presupuesto Total</p>
                            <p className="text-xl font-bold text-gray-800 font-mono">{fmtM(kpis.totalBase)}</p>
                            <p className="text-[10px] text-gray-400">{kpis.conPresupuesto} casas con base</p>
                        </div>
                        <div className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                            <p className="text-gray-500 text-xs">Pagado Real</p>
                            <p className="text-xl font-bold text-gray-800 font-mono">{fmtM(kpis.totalReal)}</p>
                            <p className={`text-[10px] ${diffColor(kpis.diffPct)}`}>{fmtPct(kpis.diffPct)} vs base</p>
                        </div>
                        <div className="bg-white border border-green-200 rounded-xl p-4 shadow-sm">
                            <p className="text-gray-500 text-xs">En Rango</p>
                            <p className="text-xl font-bold text-green-600">{kpis.enRango}</p>
                            <p className="text-[10px] text-gray-400">desviacion menor a 10%</p>
                        </div>
                        <div className="bg-white border border-red-200 rounded-xl p-4 shadow-sm">
                            <p className="text-gray-500 text-xs">Sobre Presupuesto</p>
                            <p className="text-xl font-bold text-red-600">{kpis.sobreGasto}</p>
                            <p className="text-[10px] text-gray-400">desviacion mayor a +10%</p>
                        </div>
