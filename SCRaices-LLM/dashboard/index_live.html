                        <div className="bg-white border border-orange-200 rounded-xl p-4 shadow-sm">
                            <p className="text-gray-500 text-xs">Alertas Coherencia</p>
                            <p className="text-xl font-bold text-orange-600">{kpis.conAlertaCoherencia}</p>
                            <p className="text-[10px] text-gray-400">
                                {kpis.conAlertaCoherencia > 0 ? "pagado sin avance fisico" : "todo alineado"}
                                {kpis.conAvanceSinPago > 0 && ` | ${kpis.conAvanceSinPago} sin cobrar`}
                            </p>
                        </div>
                    </div>

                    {/* Tabla Comparativa */}
                    <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-xs">
                                <thead>
                                    <tr className="bg-gray-50 border-b border-gray-200">
                                        <th className="text-left px-3 py-2 font-medium text-gray-600 cursor-pointer hover:bg-gray-100 sticky left-0 bg-gray-50 z-10 min-w-[160px]" onClick={() => toggleOrden("nombre")}>
                                            Beneficiario {ordenCol === "nombre" ? (ordenDir === "asc" ? "↑" : "↓") : ""}
                                        </th>
                                        {FAMILIAS_MO.map(fam => (
                                            <th key={fam} className="text-center px-1 py-2 font-medium text-gray-600 cursor-pointer hover:bg-gray-100 min-w-[60px]" onClick={() => toggleOrden(fam)}>
                                                {FAMILIAS_LABELS[fam]}
                                            </th>
                                        ))}
                                        <th className="text-center px-2 py-2 font-medium text-gray-600 border-l border-gray-300 cursor-pointer hover:bg-gray-100" onClick={() => toggleOrden("totalBase")}>
                                            Base M.O. {ordenCol === "totalBase" ? (ordenDir === "asc" ? "↑" : "↓") : ""}
                                        </th>
                                        <th className="text-center px-2 py-2 font-medium text-gray-600 cursor-pointer hover:bg-gray-100" onClick={() => toggleOrden("totalReal")}>
                                            Real M.O. {ordenCol === "totalReal" ? (ordenDir === "asc" ? "↑" : "↓") : ""}
                                        </th>
                                        <th className="text-center px-2 py-2 font-medium text-gray-600 cursor-pointer hover:bg-gray-100" onClick={() => toggleOrden("diff")}>
                                            Desv. {ordenCol === "diff" ? (ordenDir === "asc" ? "↑" : "↓") : ""}
                                        </th>
                                        <th className="text-center px-2 py-2 font-medium text-gray-600 border-l border-gray-300">Otros</th>
                                        <th className="text-center px-2 py-2 font-medium text-gray-600">Total</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {comparativoOrdenado.map((c, idx) => (
                                        <React.Fragment key={c.id}>
                                            <tr className={`border-b border-gray-100 hover:bg-gray-50 cursor-pointer ${expandido === c.id ? 'bg-blue-50' : ''} ${diffBg(c.diffGlobal)}`}
                                                onClick={() => setExpandido(expandido === c.id ? null : c.id)}>
                                                <td className="px-3 py-2 font-medium text-gray-800 sticky left-0 bg-inherit z-10">
                                                    <div className="flex items-center gap-1">
                                                        <span className={`transform transition-transform ${expandido === c.id ? 'rotate-90' : ''}`}>
                                                            <IconChevronRight />
                                                        </span>
                                                        <div>
                                                            <div className="truncate max-w-[130px]">{c.nombre}</div>
                                                            <div className="text-[9px] text-gray-400">{c.tipologia}</div>
                                                        </div>
                                                    </div>
                                                </td>
                                                {FAMILIAS_MO.map(fam => {
                                                    const f = c.familias[fam];
                                                    const coherBorder = f.coherencia === "pagado_sin_avance" ? "border-l-2 border-red-500"
                                                        : f.coherencia === "avance_sin_pago" ? "border-l-2 border-amber-400" : "";
                                                    return (
                                                        <td key={fam} className={`text-center px-1 py-1.5 ${coherBorder}`}>
                                                            {f.base > 0 || f.real > 0 || f.avPct > 0 ? (
                                                                <div>
                                                                    <div className="font-mono text-[10px]">{fmtM(f.real)}</div>
                                                                    {f.avPct !== null && (
                                                                        <div className="flex items-center justify-center gap-0.5">
                                                                            <div className="w-8 bg-gray-200 rounded-full h-1">
                                                                                <div className={`h-1 rounded-full ${f.avPct >= 90 ? 'bg-emerald-500' : f.avPct >= 50 ? 'bg-blue-400' : f.avPct > 0 ? 'bg-amber-400' : 'bg-gray-200'}`}
                                                                                    style={{ width: `${Math.min(f.avPct, 100)}%` }} />
                                                                            </div>
                                                                            <span className="text-[8px] text-gray-400 font-mono">{f.avPct}%</span>
                                                                        </div>
                                                                    )}
                                                                    {f.coherencia === "pagado_sin_avance" && (
                                                                        <div className="text-[8px] text-red-600 font-semibold" title="Pagado pero sin avance fisico">!!</div>
                                                                    )}
                                                                    {f.coherencia === "avance_sin_pago" && (
                                                                        <div className="text-[8px] text-amber-600" title="Avance fisico sin pago">s/p</div>
                                                                    )}
                                                                </div>
                                                            ) : (
                                                                <span className="text-gray-300">-</span>
                                                            )}
                                                        </td>
                                                    );
                                                })}
                                                <td className="text-center px-2 py-2 font-mono border-l border-gray-300 text-gray-500">
                                                    {c.tienePresupuesto ? fmtM(c.totalBase) : <span className="text-gray-300 text-[9px]">s/d</span>}
                                                </td>
                                                <td className="text-center px-2 py-2 font-mono font-medium">{fmtM(c.totalReal)}</td>
                                                <td className={`text-center px-2 py-2 font-mono ${c.tienePresupuesto ? diffColor(c.diffGlobal) : 'text-gray-300'}`}>
                                                    {c.tienePresupuesto ? fmtPct(c.diffGlobal) : "-"}
                                                </td>
                                                <td className="text-center px-2 py-2 font-mono text-gray-500 border-l border-gray-300">{fmtM(c.totalOtros)}</td>
                                                <td className="text-center px-2 py-2 font-mono font-bold text-gray-800">{fmtM(c.totalRealGlobal)}</td>
                                            </tr>
                                            {expandido === c.id && (
                                                <tr>
                                                    <td colSpan={FAMILIAS_MO.length + 6} className="bg-gray-50 px-4 py-3 border-b border-gray-200">
                                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                            {/* Detalle por familia con avance */}
                                                            <div>
                                                                <h4 className="text-xs font-semibold text-gray-600 mb-2">Pago vs Avance por Familia</h4>
                                                                <table className="w-full text-[11px]">
                                                                    <thead>
                                                                        <tr className="text-gray-500">
                                                                            <th className="text-left pb-1">Familia</th>
                                                                            <th className="text-right pb-1">Base</th>
                                                                            <th className="text-right pb-1">Real</th>
                                                                            <th className="text-right pb-1">%Desv</th>
                                                                            <th className="text-center pb-1">Avance</th>
                                                                            <th className="text-center pb-1">Estado</th>
                                                                        </tr>
                                                                    </thead>
                                                                    <tbody>
                                                                        {FAMILIAS_MO.filter(fam => c.familias[fam].base > 0 || c.familias[fam].real > 0 || (c.familias[fam].avPct !== null && c.familias[fam].avPct > 0)).map(fam => {
                                                                            const f = c.familias[fam];
                                                                            return (
                                                                                <tr key={fam} className={`border-t border-gray-200 ${f.coherencia === 'pagado_sin_avance' ? 'bg-red-50' : f.coherencia === 'avance_sin_pago' ? 'bg-amber-50' : ''}`}>
                                                                                    <td className="py-1 text-gray-700">{FAMILIAS_LABELS[fam] || fam}</td>
                                                                                    <td className="py-1 text-right font-mono text-gray-500">{fmtM(f.base)}</td>
                                                                                    <td className="py-1 text-right font-mono">{fmtM(f.real)}</td>
                                                                                    <td className={`py-1 text-right font-mono ${diffColor(f.diff)}`}>{fmtPct(f.diff)}</td>
                                                                                    <td className="py-1 text-center">
                                                                                        {f.avPct !== null ? (
                                                                                            <div className="flex items-center justify-center gap-1">
                                                                                                <div className="w-10 bg-gray-200 rounded-full h-1.5">
                                                                                                    <div className={`h-1.5 rounded-full ${f.avPct >= 90 ? 'bg-emerald-500' : f.avPct >= 50 ? 'bg-blue-400' : f.avPct > 0 ? 'bg-amber-400' : 'bg-gray-200'}`}
                                                                                                        style={{ width: `${Math.min(f.avPct, 100)}%` }} />
                                                                                                </div>
                                                                                                <span className="font-mono text-[10px]">{f.avPct}%</span>
                                                                                            </div>
                                                                                        ) : <span className="text-gray-300 text-[9px]">s/i</span>}
                                                                                    </td>
                                                                                    <td className="py-1 text-center text-[9px]">
                                                                                        {f.coherencia === "pagado_sin_avance" && <span className="text-red-600 font-bold">PAGADO s/AVANCE</span>}
                                                                                        {f.coherencia === "avance_sin_pago" && <span className="text-amber-600 font-semibold">SIN COBRAR</span>}
                                                                                        {f.coherencia === "ok" && f.real > 0 && <span className="text-green-600">OK</span>}
                                                                                        {f.coherencia === "sin_actividad" && <span className="text-gray-400">-</span>}
                                                                                    </td>
                                                                                </tr>
                                                                            );
                                                                        })}
                                                                        <tr className="border-t-2 border-gray-300 font-semibold">
                                                                            <td className="py-1">Total M.O.</td>
                                                                            <td className="py-1 text-right font-mono">{fmtM(c.totalBase)}</td>
                                                                            <td className="py-1 text-right font-mono">{fmtM(c.totalReal)}</td>
                                                                            <td className={`py-1 text-right font-mono ${diffColor(c.diffGlobal)}`}>{fmtPct(c.diffGlobal)}</td>
                                                                            <td className="py-1 text-center font-mono">
                                                                                {c.avanceTotalInsp !== null ? `${Math.round(c.avanceTotalInsp)}%` : "s/i"}
                                                                            </td>
                                                                            <td />
                                                                        </tr>
                                                                    </tbody>
                                                                </table>
                                                            </div>

                                                            {/* Detalle de partidas por familia */}
                                                            <div>
                                                                <h4 className="text-xs font-semibold text-gray-600 mb-2">Detalle Partidas Inspeccion</h4>
                                                                {Object.entries(c.avanceFam).filter(([fam, av]) => av && av.partidas).length > 0 ? (
                                                                    <div className="space-y-2">
                                                                        {Object.entries(c.avanceFam).filter(([fam, av]) => av && av.partidas).map(([fam, av]) => (
                                                                            <div key={fam}>
                                                                                <div className="text-[10px] font-medium text-gray-600 mb-0.5">
                                                                                    {FAMILIAS_LABELS[fam] || fam} <span className="text-gray-400">({av.completas}/{av.total})</span>
                                                                                </div>
                                                                                <div className="flex flex-wrap gap-1">
                                                                                    {av.partidas.map(p => (
                                                                                        <div key={p.nombre} className={`px-1.5 py-0.5 rounded text-[9px] font-mono ${
                                                                                            p.valor >= 100 ? 'bg-emerald-100 text-emerald-700' :
                                                                                            p.valor >= 50 ? 'bg-blue-100 text-blue-700' :
                                                                                            p.valor > 0 ? 'bg-amber-100 text-amber-700' :
                                                                                            'bg-gray-100 text-gray-400'
                                                                                        }`}>
                                                                                            {p.nombre} {p.valor}%
                                                                                        </div>
                                                                                    ))}
                                                                                </div>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                ) : (
                                                                    <p className="text-gray-400 text-[11px]">Sin datos de inspeccion para esta vivienda</p>
                                                                )}
                                                            </div>

                                                            {/* Otros gastos + barra visual */}
                                                            <div>
                                                                <h4 className="text-xs font-semibold text-gray-600 mb-2">Otros Gastos</h4>
                                                                <div className="space-y-1 mb-3">
                                                                    {FAMILIAS_OTROS.filter(fam => (c.realPorFamilia[fam] || 0) > 0).map(fam => (
                                                                        <div key={fam} className="flex justify-between text-[11px]">
                                                                            <span className="text-gray-600">{fam}</span>
                                                                            <span className="font-mono">{fmtM(c.realPorFamilia[fam])}</span>
                                                                        </div>
                                                                    ))}
                                                                    {c.totalOtros === 0 && <p className="text-gray-400 text-[11px]">Sin gastos adicionales</p>}
                                                                </div>

                                                                {/* Barra visual triple: base vs real vs avance */}
                                                                <h4 className="text-xs font-semibold text-gray-600 mb-2 mt-4">Base vs Real vs Avance</h4>
                                                                <div className="space-y-2">
                                                                    <div>
                                                                        <div className="flex justify-between text-[10px] text-gray-500 mb-0.5">
                                                                            <span>Base</span>
                                                                            <span className="font-mono">{fmtM(c.totalBaseGlobal)}</span>
                                                                        </div>
                                                                        <div className="w-full bg-gray-200 rounded h-3">
                                                                            <div className="bg-gray-400 rounded h-3" style={{ width: '100%' }} />
                                                                        </div>
                                                                    </div>
                                                                    <div>
                                                                        <div className="flex justify-between text-[10px] text-gray-500 mb-0.5">
                                                                            <span>Pagado</span>
                                                                            <span className="font-mono">{fmtM(c.totalRealGlobal)}</span>
                                                                        </div>
                                                                        <div className="w-full bg-gray-200 rounded h-3">
                                                                            {(() => {
                                                                                const pct = c.totalBaseGlobal > 0 ? Math.min((c.totalRealGlobal / c.totalBaseGlobal) * 100, 150) : 0;
                                                                                const color = c.diffGlobal > 20 ? 'bg-red-500' : c.diffGlobal > 10 ? 'bg-orange-400' : 'bg-green-500';
                                                                                return <div className={`${color} rounded h-3`} style={{ width: `${Math.min(pct, 100)}%` }} />;
                                                                            })()}
                                                                        </div>
                                                                    </div>
                                                                    <div>
                                                                        <div className="flex justify-between text-[10px] text-gray-500 mb-0.5">
                                                                            <span>Avance Fisico</span>
                                                                            <span className="font-mono">{c.avanceTotalInsp !== null ? `${Math.round(c.avanceTotalInsp)}%` : "s/i"}</span>
                                                                        </div>
                                                                        <div className="w-full bg-gray-200 rounded h-3">
                                                                            <div className="bg-emerald-500 rounded h-3" style={{ width: `${c.avanceTotalInsp || 0}%` }} />
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </td>
                                                </tr>
                                            )}
                                        </React.Fragment>
                                    ))}
                                </tbody>
                                {/* Fila de totales */}
                                <tfoot>
                                    <tr className="bg-gray-100 border-t-2 border-gray-300 font-semibold text-xs">
                                        <td className="px-3 py-2 sticky left-0 bg-gray-100 z-10">TOTAL PROYECTO</td>
                                        {FAMILIAS_MO.map(fam => {
                                            const totalBase = comparativo.reduce((s, c) => s + c.familias[fam].base, 0);
                                            const totalReal = comparativo.reduce((s, c) => s + c.familias[fam].real, 0);
                                            const diff = totalBase > 0 ? ((totalReal - totalBase) / totalBase * 100) : 0;
                                            return (
                                                <td key={fam} className="text-center px-1 py-2">
                                                    <div className="font-mono text-[10px]">{fmtM(totalReal)}</div>
                                                    {totalBase > 0 && <div className={`text-[9px] ${diffColor(diff)}`}>{fmtPct(diff)}</div>}
                                                </td>
                                            );
                                        })}
                                        <td className="text-center px-2 py-2 font-mono border-l border-gray-300 text-gray-600">{fmtM(kpis.totalBase)}</td>
                                        <td className="text-center px-2 py-2 font-mono">{fmtM(kpis.totalReal)}</td>
                                        <td className={`text-center px-2 py-2 font-mono ${diffColor(kpis.diffPct)}`}>{fmtPct(kpis.diffPct)}</td>
                                        <td className="text-center px-2 py-2 font-mono text-gray-600 border-l border-gray-300">
                                            {fmtM(comparativo.reduce((s, c) => s + c.totalOtros, 0))}
                                        </td>
                                        <td className="text-center px-2 py-2 font-mono font-bold">
                                            {fmtM(comparativo.reduce((s, c) => s + c.totalRealGlobal, 0))}
                                        </td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>

                    {/* Leyenda */}
                    <div className="mt-4 flex flex-wrap gap-4 text-[10px] text-gray-500">
                        <span><span className="inline-block w-2 h-2 rounded bg-green-500 mr-1" />En rango (+-10%)</span>
                        <span><span className="inline-block w-2 h-2 rounded bg-orange-400 mr-1" />Sobre +10-20%</span>
                        <span><span className="inline-block w-2 h-2 rounded bg-red-500 mr-1" />Sobre +20%</span>
                        <span><span className="inline-block w-2 h-2 rounded bg-blue-400 mr-1" />Bajo -10%</span>
                        <span className="ml-2 border-l-2 border-red-500 pl-1">!! Pagado sin avance</span>
                        <span className="border-l-2 border-amber-400 pl-1">s/p Avance sin cobrar</span>
                    </div>
                    <div className="mt-1 text-[10px] text-gray-400">
                        Base: Tabla M.O. por tipologia | Real: Solpago Aprobados | Avance: Inspecciones (promedio partidas) | Otros: Viaticos, Extras, Adicionales
                    </div>
                </div>
            );
        };

        // ===== VISTA PROYECTO (NUEVO v2) =====
        const VistaProyecto = ({ viviendas, proyectoSel }) => {
            const [subTab, setSubTab] = React.useState("matriz");
            const proy = PROYECTOS_DATA.find(p => String(p.ID_proy) === String(proyectoSel));

            // Calcular KPIs de ritmo
            const kpisRitmo = React.useMemo(() => {
                const terminadas = viviendas.filter(v => {
                    const insp = getInspeccion(v.ID_Benef);
                    const todasDesp = SECUENCIA_PRINCIPAL.every(k => v.estadoEtapas[k]?.estado === "despachado");
                    return todasDesp && insp && insp.pct_total >= 90;
                });
                const conDespacho = viviendas.filter(v => v.numDespachos > 0);
                const sinIniciar = viviendas.filter(v => v.numDespachos === 0);
                const activas = conDespacho.filter(v => !terminadas.includes(v));

                // Dias promedio fund -> ultima etapa
                let diasTotal = 0, diasCount = 0;
                conDespacho.forEach(v => {
                    const fund = v.estadoEtapas["01_FUNDACIONES"];
                    if (fund?.fechaDespacho) {
                        let maxFecha = new Date(fund.fechaDespacho);
                        Object.values(v.estadoEtapas).forEach(info => {
                            if (info.estado === "despachado" && info.fechaDespacho) {
                                const f = new Date(info.fechaDespacho);
                                if (f > maxFecha) maxFecha = f;
                            }
                        });
                        const dias = Math.floor((maxFecha - new Date(fund.fechaDespacho)) / (1000*60*60*24));
                        if (dias > 0) { diasTotal += dias; diasCount++; }
                    }
                });

                // Total pagado del proyecto
                const totalPagadoProy = viviendas.reduce((s, v) => s + getTotalPagado(v.ID_Benef), 0);

                return {
                    terminadas: terminadas.length,
                    activas: activas.length,
                    sinIniciar: sinIniciar.length,
                    diasPromedio: diasCount > 0 ? Math.round(diasTotal / diasCount) : 0,
                    totalPagado: totalPagadoProy,
                    total: viviendas.length
                };
            }, [viviendas]);

            // Distribucion por etapa: cuantas casas esperan cada una
            const distribucion = React.useMemo(() => {
                return SECUENCIA_PRINCIPAL.map(etapaKey => {
                    const config = ETAPAS_CONFIG[etapaKey];
                    const despachadas = viviendas.filter(v => v.estadoEtapas[etapaKey]?.estado === "despachado").length;
                    const esperando = viviendas.filter(v => {
                        const st = v.estadoEtapas[etapaKey]?.estado;
                        return st && st !== "despachado" && st !== "bloqueado";
                    }).length;
                    const criticas = viviendas.filter(v => v.estadoEtapas[etapaKey]?.estado === "critico").length;
                    return { key: etapaKey, nombre: config?.nombre || etapaKey, despachadas, esperando, criticas };
                });
            }, [viviendas]);

            // Resumen financiero por familia
            const resumenFinanciero = React.useMemo(() => {
                const porFamilia = {};
                let totalViaticos = 0, totalMO = 0, totalOtros = 0;
                viviendas.forEach(v => {
                    const pagos = getSolpago(v.ID_Benef);
                    pagos.forEach(p => {
                        if (!porFamilia[p.Familia_pago]) porFamilia[p.Familia_pago] = { total: 0, count: 0 };
                        porFamilia[p.Familia_pago].total += p.monto;
                        porFamilia[p.Familia_pago].count++;
                        if (p.Familia_pago === "Viatico") totalViaticos += p.monto;
                        else if (FAMILIAS_CRITICAS.includes(p.Familia_pago)) totalMO += p.monto;
                        else totalOtros += p.monto;
                    });
                });
                return { porFamilia, totalViaticos, totalMO, totalOtros };
            }, [viviendas]);

            const maxBarWidth = Math.max(...distribucion.map(d => d.despachadas + d.esperando), 1);

            // Datos de contrato y garantías del proyecto
            const contratoInfo = React.useMemo(() => {
                if (!proy) return null;
                const fi = proy.fecha_inicio;
                const dur = proy.duracion;
                if (!fi || !dur) return null;
                const inicio = new Date(fi);
                const vencimiento = new Date(inicio);
                vencimiento.setDate(vencimiento.getDate() + dur);
                const hoy = new Date();
                const diasRestantes = Math.floor((vencimiento - hoy) / (1000*60*60*24));
                return { inicio: fi, duracion: dur, vencimiento: vencimiento.toISOString().substring(0,10), diasRestantes };
            }, [proy]);

            const garantiasProy = React.useMemo(() => {
                if (!proy) return [];
                return GARANTIAS_DATA.filter(g => g.ID_Proy === proy.ID_proy).map(g => {
                    const hoy = new Date();
                    const fv = g.fecha_vcmto ? new Date(g.fecha_vcmto) : null;
                    const diasVcmto = fv ? Math.floor((fv - hoy) / (1000*60*60*24)) : null;
                    return { ...g, diasVcmto };
                });
            }, [proy]);

            const eeppProy = React.useMemo(() => {
                const idsProyecto = new Set(viviendas.map(v => String(v.ID_Benef)));
                return EEPP_DATA.filter(ep => idsProyecto.has(String(ep.ID_Benef)));
            }, [viviendas]);

            const eeppResumen = React.useMemo(() => {
                const pagado = eeppProy.filter(e => e.Estado.includes("Pagado"));
                const ingresado = eeppProy.filter(e => e.Estado.includes("Ingresado"));
                const prep = eeppProy.filter(e => !e.Estado.includes("Pagado") && !e.Estado.includes("Ingresado"));
                const montoPag = pagado.reduce((s, e) => s + e.Monto, 0);
                const montoIng = ingresado.reduce((s, e) => s + e.Monto, 0);
                const montoPrep = prep.reduce((s, e) => s + e.Monto, 0);
                const total = montoPag + montoIng + montoPrep;
                return { pagado: montoPag, ingresado: montoIng, preparacion: montoPrep, total, countPag: pagado.length, countIng: ingresado.length, countPrep: prep.length };
            }, [eeppProy]);

            const formatUF = (val) => {
                if (!val && val !== 0) return '—';
                return val.toLocaleString('es-CL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' UF';
            };

            const formatFecha = (iso) => {
                if (!iso) return '—';
                const [y,m,d] = iso.split('-');
                return `${d}/${m}/${y}`;
            };

            return (
                <div>
                    {/* Header */}
                    <div className="mb-4">
                        <p className="text-gray-500 text-sm mb-1">Vista Proyecto — {proy?.COMUNA} — {proy?.ID_proy}</p>
                        <h2 className="text-2xl font-bold text-gray-800">{proy?.NOMBRE_PROYECTO}</h2>
                    </div>

                    {/* Resumen Contrato + Garantías + EP */}
                    {(contratoInfo || garantiasProy.length > 0 || eeppProy.length > 0) && (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                            {/* Contrato */}
                            {contratoInfo && (
                                <div className={`bg-white border rounded-lg p-3 shadow-sm ${
                                    contratoInfo.diasRestantes < 0 ? "border-red-300 bg-red-50" :
                                    contratoInfo.diasRestantes < 30 ? "border-yellow-300 bg-yellow-50" :
                                    "border-gray-200"
                                }`}>
                                    <div className="flex items-center gap-2 mb-2">
                                        <svg className="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                        <span className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Contrato</span>
                                    </div>
                                    <div className="grid grid-cols-4 gap-2 text-xs">
                                        <div>
                                            <p className="text-gray-400">Inicio</p>
                                            <p className="font-semibold text-gray-700">{formatFecha(contratoInfo.inicio)}</p>
                                        </div>
                                        <div>
                                            <p className="text-gray-400">Plazo</p>
                                            <p className="font-semibold text-gray-700">{contratoInfo.duracion} días</p>
                                        </div>
                                        <div>
                                            <p className="text-gray-400">Vencimiento</p>
                                            <p className="font-semibold text-gray-700">{formatFecha(contratoInfo.vencimiento)}</p>
                                        </div>
                                        <div>
                                            <p className="text-gray-400">Estado</p>
                                            {contratoInfo.diasRestantes < 0 ? (
                                                <p className="font-bold text-red-600">VENCIDO ({Math.abs(contratoInfo.diasRestantes)}d)</p>
                                            ) : contratoInfo.diasRestantes < 30 ? (
                                                <p className="font-bold text-yellow-600">{contratoInfo.diasRestantes}d restantes</p>
                                            ) : (
                                                <p className="font-semibold text-green-600">{contratoInfo.diasRestantes}d restantes</p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                            {/* Garantías */}
                            {garantiasProy.length > 0 && (
                                <div className="bg-white border border-gray-200 rounded-lg p-3 shadow-sm">
                                    <div className="flex items-center gap-2 mb-2">
                                        <svg className="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                                        <span className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Garantías</span>
                                    </div>
                                    <div className="space-y-1.5">
                                        {garantiasProy.map((g, i) => {
                                            const esVencida = g.diasVcmto !== null && g.diasVcmto < 0;
                                            const porVencer = g.diasVcmto !== null && g.diasVcmto >= 0 && g.diasVcmto < 60;
                                            const tipoCorto = g.tipo.includes("Fiel") ? (g.tipo.includes("convenio") ? "Fiel Cumpl. Conv." : "Fiel Cumpl. Contrato") : g.tipo.includes("Buena") ? "Buena Ejecución" : g.tipo;
                                            return (
                                                <div key={i} className={`flex items-center justify-between text-xs px-2 py-1 rounded ${
                                                    esVencida ? "bg-red-50 text-red-700" : porVencer ? "bg-yellow-50 text-yellow-700" : "bg-gray-50 text-gray-600"
                                                }`}>
                                                    <div className="flex items-center gap-2">
                                                        <span className="font-medium">{tipoCorto}</span>
                                                        <span className="text-gray-400">{g.tipo1} #{g.num_bol}</span>
                                                        {g.monto_uf > 0 && <span className="text-gray-400">UF {g.monto_uf.toLocaleString()}</span>}
                                                    </div>
                                                    <div className="font-semibold">
                                                        {g.diasVcmto === null ? "Sin fecha" :
                                                          esVencida ? `VENCIDA (${Math.abs(g.diasVcmto)}d)` :
                                                          porVencer ? `${g.diasVcmto}d - ${formatFecha(g.fecha_vcmto)}` :
                                                          formatFecha(g.fecha_vcmto)
                                                        }
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                            {/* Estados de Pago resumen */}
                            {eeppProy.length > 0 && (
                                <div className="bg-white border border-gray-200 rounded-lg p-3 shadow-sm">
                                    <div className="flex items-center gap-2 mb-2">
                                        <svg className="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                                        <span className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Estados de Pago</span>
                                    </div>
                                    {(() => {
                                        const total = eeppResumen.total;
                                        if (total === 0) return <p className="text-gray-400 text-xs">Sin EP registrados</p>;
                                        const pctPag = (eeppResumen.pagado / total * 100).toFixed(0);
                                        const pctIng = (eeppResumen.ingresado / total * 100).toFixed(0);
                                        return (
                                            <div>
                                                <div className="flex rounded-full h-5 overflow-hidden mb-2">
                                                    {eeppResumen.pagado > 0 && <div className="bg-green-500 flex items-center justify-center text-[9px] font-bold text-white" style={{ width: `${pctPag}%` }}>{pctPag}%</div>}
                                                    {eeppResumen.ingresado > 0 && <div className="bg-yellow-400 flex items-center justify-center text-[9px] font-bold text-yellow-900" style={{ width: `${pctIng}%` }}></div>}
                                                    {eeppResumen.preparacion > 0 && <div className="bg-gray-300 flex items-center justify-center text-[9px] font-bold text-gray-600" style={{ width: `${100 - parseInt(pctPag) - parseInt(pctIng)}%` }}></div>}
                                                </div>
                                                <div className="grid grid-cols-3 gap-1 text-[10px]">
                                                    <div><span className="text-green-600 font-semibold">Pagado</span><br/><span className="font-mono font-bold text-gray-700">{formatUF(eeppResumen.pagado)}</span></div>
                                                    <div><span className="text-yellow-600 font-semibold">Ingresado</span><br/><span className="font-mono font-bold text-gray-700">{formatUF(eeppResumen.ingresado)}</span></div>
                                                    <div><span className="text-gray-500 font-semibold">Total</span><br/><span className="font-mono font-bold text-gray-700">{formatUF(total)}</span></div>
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                            )}
                        </div>
                    )}

                    {/* KPIs de Ritmo */}
                    <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-6">
                        <div className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                            <p className="text-gray-500 text-xs">Total Casas</p>
                            <p className="text-2xl font-bold text-gray-800 mt-1">{kpisRitmo.total}</p>
                        </div>
                        <div className="bg-white border border-green-200 rounded-xl p-4 shadow-sm">
                            <p className="text-green-600 text-xs">Terminadas</p>
                            <p className="text-2xl font-bold text-green-700 mt-1">{kpisRitmo.terminadas}</p>
                            <p className="text-[10px] text-gray-400">Desp 100% + Insp &gt;90%</p>
                        </div>
                        <div className="bg-white border border-blue-200 rounded-xl p-4 shadow-sm">
                            <p className="text-blue-600 text-xs">Activas</p>
                            <p className="text-2xl font-bold text-blue-700 mt-1">{kpisRitmo.activas}</p>
                            <p className="text-[10px] text-gray-400">Con despacho, no terminadas</p>
                        </div>
                        <div className="bg-white border border-yellow-200 rounded-xl p-4 shadow-sm">
                            <p className="text-yellow-600 text-xs">Sin Iniciar</p>
                            <p className="text-2xl font-bold text-yellow-700 mt-1">{kpisRitmo.sinIniciar}</p>
                        </div>
                        <div className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                            <p className="text-gray-500 text-xs">Días Promedio</p>
                            <p className="text-2xl font-bold text-gray-800 mt-1">{kpisRitmo.diasPromedio}d</p>
                            <p className="text-[10px] text-gray-400">Fund → última etapa</p>
                        </div>
                        <div className="bg-white border border-violet-200 rounded-xl p-4 shadow-sm">
                            <p className="text-violet-600 text-xs">Total Pagado</p>
                            <p className="text-lg font-bold text-violet-700 mt-1 font-mono">{formatPeso(kpisRitmo.totalPagado)}</p>
                        </div>
                    </div>

                    {/* Sub-tabs */}
                    <div className="flex gap-1 bg-white border border-gray-200 rounded-lg p-1 shadow-sm mb-6">
                        {[["matriz", "Matriz de Avance"], ["distribucion", "Distribución + Timeline"], ["financiero", "Resumen Financiero"], ["mano_obra", "Mano de Obra"], ["estados_pago", "Estados de Pago"]].map(([k, l]) => (
                            <button
                                key={k}
                                onClick={() => setSubTab(k)}
                                className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${
                                    subTab === k ? "bg-raices-red text-white" : "text-gray-600 hover:bg-gray-100"
                                }`}
                            >{l}</button>
                        ))}
                    </div>

                    {/* Matriz de Avance */}
                    {subTab === "matriz" && (
                        <div className="bg-white border border-gray-200 rounded-lg shadow-sm overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="text-left text-gray-500 border-b border-gray-200 bg-gray-50">
                                        <th className="py-2 px-3 sticky left-0 bg-gray-50 z-10 min-w-[180px]">Beneficiario</th>
                                        {SECUENCIA_PRINCIPAL.map(key => (
                                            <th key={key} className="py-2 px-2 text-center text-xs">{ETAPAS_CONFIG[key]?.nombre}</th>
                                        ))}
                                        <th className="py-2 px-2 text-center text-xs">Insp%</th>
                                        <th className="py-2 px-2 text-center text-xs">Pagado</th>
                                        <th className="py-2 px-2 text-center text-xs">Coher.</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {viviendas.sort((a, b) => b.numDespachos - a.numDespachos).map(v => {
                                        const insp = getInspeccion(v.ID_Benef);
                                        const totalPag = getTotalPagado(v.ID_Benef);
                                        const alerts = calcCoherencia(v.ID_Benef, v.estadoEtapas);
                                        const alertasRojas = alerts.filter(a => a.tipo === "rojo");
                                        const alertasNaranjas = alerts.filter(a => a.tipo === "naranja");

                                        return (
                                            <tr key={v.ID_Benef} className="border-b border-gray-100 hover:bg-gray-50">
                                                <td className="py-2 px-3 sticky left-0 bg-white z-10">
                                                    <div className="font-medium text-gray-800 text-xs">{v.NOMBRES} {v.APELLIDOS}</div>
                                                    <div className="text-[10px] text-gray-400">{v.tipologia}</div>
                                                </td>
                                                {SECUENCIA_PRINCIPAL.map(key => {
                                                    const info = v.estadoEtapas[key];
                                                    const colores = {
                                                        despachado: "bg-blue-500 text-white",
                                                        solicitado: "bg-purple-500 text-white",
                                                        en_tiempo: "bg-green-400 text-white",
                                                        atencion: "bg-yellow-400 text-yellow-900",
                                                        critico: "bg-red-500 text-white animate-pulse",
                                                        bloqueado: "bg-gray-200 text-gray-400"
                                                    };
                                                    const tooltipParts = [info?.nombre + ": " + (info?.estado || "bloqueado")];
                                                    if (info?.estado === "despachado") {
                                                        tooltipParts.push("Despacho: " + (info.fechaDespacho || "") + " (" + (info.diasTranscurridos || 0) + "d)");
                                                        if (info.fechaSolicitud) tooltipParts.push("Solicitud: " + info.fechaSolicitud);
                                                    } else if (info?.estado === "solicitado") {
                                                        tooltipParts.push("Solicitud: " + (info.fechaSolicitud || "") + " (hace " + (info.diasSolicitud || 0) + "d)");
                                                        tooltipParts.push("Esperando despacho");
                                                    } else if (info?.diasTranscurridos) {
                                                        tooltipParts.push(info.diasTranscurridos + " dias desde dependencia");
                                                    }
                                                    return (
                                                        <td key={key} className="py-2 px-1 text-center">
                                                            <div
                                                                className={`matrix-cell inline-flex items-center justify-center rounded-md text-[10px] font-bold ${colores[info?.estado || "bloqueado"]} ${info?.estado === "solicitado" ? "w-8 h-8" : "w-8 h-8"}`}
                                                                title={tooltipParts.join(" | ")}
                                                            >
                                                                {info?.estado === "despachado" ? "D" + (info.diasTranscurridos || "") :
                                                                  info?.estado === "solicitado" ? "S" + (info.diasSolicitud || "") :
                                                                  info?.estado === "bloqueado" ? "—" :
                                                                  "+" + (info?.diasTranscurridos || 0) + "d"}
                                                            </div>
                                                        </td>

        const IconDocument = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>;

                    : "application/pdf";
                const byteChars = atob(reporte.base64);
                const byteNumbers = new Array(byteChars.length);
                for (let i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: mime });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `${reporte.nombre.replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ ]/g, '_')}.${ext}`;

                            <div className="flex gap-2 mb-6">
                                <div className="flex gap-1 bg-white border border-gray-200 rounded-lg p-1 shadow-sm">
                                    {[["todos", "Todos"], ["critico", "Críticos"], ["atencion", "Atención"], ["en_tiempo", "En tiempo"]].map(([k, l]) => (
                                        <button
                                            key={k}
                                            onClick={() => setFiltro(k)}
                                            className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${
                                                filtro === k
                                                    ? "bg-raices-red text-white"
                                                    : "text-gray-600 hover:bg-gray-100"
                                            }`}
                                        >
                                            {l}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Lista de Viviendas */}
                            <div className="space-y-3">
                                {filtradas.length === 0 ? (
                                    <div className="text-center py-12 text-gray-400 bg-white rounded-lg border border-gray-200">
                                        <IconUsers />
                                        <p className="mt-3">No se encontraron viviendas</p>
                                    </div>
                                ) : (
                                    filtradas.sort((a, b) => b.numDespachos - a.numDespachos)
                                        .map(v => <ViviendaCard key={v.ID_Benef} beneficiario={v} estadoEtapas={v.estadoEtapas} expanded={expandida === v.ID_Benef} onToggle={() => setExpandida(expandida === v.ID_Benef ? null : v.ID_Benef)} />)
                                )}
                            </div>

                            {/* Leyenda */}
                            <div className="mt-6 p-4 bg-white border border-gray-200 rounded-lg shadow-sm">
                                <h4 className="text-sm font-medium text-gray-700 mb-3">Leyenda</h4>
                                <div className="flex flex-wrap gap-6 text-sm mb-3">
                                    <div className="flex items-center gap-2"><div className="w-4 h-4 rounded-full bg-blue-500" /><span className="text-gray-600">D = Despachado</span></div>
                                    <div className="flex items-center gap-2"><div className="w-4 h-4 rounded-full bg-purple-500" /><span className="text-gray-600">S = Solicitado (esperando despacho)</span></div>
                                    <div className="flex items-center gap-2"><div className="w-4 h-4 rounded-full bg-green-500" /><span className="text-gray-600">En tiempo (&lt;7d)</span></div>
                                    <div className="flex items-center gap-2"><div className="w-4 h-4 rounded-full bg-yellow-500" /><span className="text-gray-600">Atención (7-14d)</span></div>
                                    <div className="flex items-center gap-2"><div className="w-4 h-4 rounded-full bg-red-500" /><span className="text-gray-600">Crítico (&gt;14d sin solicitud)</span></div>
                                    <div className="flex items-center gap-2"><div className="w-4 h-4 rounded-full bg-gray-300" /><span className="text-gray-600">Bloqueado</span></div>
                                </div>
                                <div className="border-t border-gray-100 pt-2">
                                    <p className="text-xs text-gray-500 font-medium mb-1">Inspecciones — %Total = 70% Viv + 25% RC + 5% Hab</p>
                                    <div className="flex flex-wrap gap-4 text-xs">
                                        <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-green-100 border border-green-200" /><span className="text-gray-500">100% completada</span></div>
                                        <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-yellow-50 border border-yellow-200" /><span className="text-gray-500">Parcial (1-99%)</span></div>
                                        <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-gray-50 border border-gray-200" /><span className="text-gray-500">Sin avance (0%)</span></div>
                                        <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-emerald-500" /><span className="text-gray-500">Barra de inspección</span></div>
                                    </div>
                                </div>
                                <div className="border-t border-gray-100 pt-2 mt-2">
                                    <p className="text-xs text-gray-500 font-medium mb-1">Verificación de Cierre (5% Habilitación = 1% cada una)</p>
                                    <div className="flex flex-wrap gap-4 text-xs">
                                        <div className="flex items-center gap-1"><span className="inline-flex items-center justify-center w-4 h-4 rounded bg-green-500 text-white text-[8px] font-bold">E</span><span className="text-gray-500">Terminado</span></div>
                                        <div className="flex items-center gap-1"><span className="inline-flex items-center justify-center w-4 h-4 rounded bg-red-100 text-red-400 border border-red-200 text-[8px] font-bold">E</span><span className="text-gray-500">Pendiente</span></div>
                                        <span className="text-gray-400">E=Empalme P=Pre-F1 D=Desarme R=Ret.Escombros A=Aseo</span>
                                    </div>
                                </div>
                                <div className="border-t border-gray-100 pt-2 mt-2">
                                    <p className="text-xs text-gray-500 font-medium mb-1">Coherencia Despacho / Inspección / Pago (v2)</p>
                                    <div className="flex flex-wrap gap-4 text-xs">
                                        <div className="flex items-center gap-1"><div className="w-3 h-1.5 rounded bg-blue-500" /><span className="text-gray-500">Despacho</span></div>
                                        <div className="flex items-center gap-1"><div className="w-3 h-1.5 rounded bg-emerald-500" /><span className="text-gray-500">Inspección</span></div>
                                        <div className="flex items-center gap-1"><div className="w-3 h-1.5 rounded bg-violet-500" /><span className="text-gray-500">Pago</span></div>
                                        <div className="flex items-center gap-1"><span className="inline-flex w-4 h-4 rounded-full bg-red-100 text-red-600 text-[8px] font-bold items-center justify-center">!</span><span className="text-gray-500">Desp+Pago pero Insp&lt;30%</span></div>
                                        <div className="flex items-center gap-1"><span className="inline-flex w-4 h-4 rounded-full bg-orange-100 text-orange-600 text-[8px] font-bold items-center justify-center">!</span><span className="text-gray-500">Desp sin pago</span></div>
                                    </div>
                                </div>
                            </div>

                            {/* Footer */}
                            <footer className="mt-6 text-center text-gray-400 text-sm">
                                <p>SG Raices — Panel de Control de Obras v2.0 — Coherencia Desp/Insp/Pago + Ritmo</p>
                                <p className="text-xs mt-1">Generado: {new Date().toLocaleString('es-CL')}</p>
                            </footer>
                            </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        // Funcion de render (llamada despues de cargar datos)
        function renderApp() {
            ReactDOM.createRoot(document.getElementById('root')).render(<DashboardObras />);
        }

        // En modo LIVE: cargar datos primero, luego renderizar
        if (typeof APPS_SCRIPT_URL !== 'undefined' && APPS_SCRIPT_URL) {
            initLiveData();
        } else {
            renderApp();
        }
    </script>
</body>
</html>
